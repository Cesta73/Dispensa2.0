<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Dispensa di Casa</title>
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dispensa">
    <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --primary:#2E7D32; --primary-light:#4CAF50; --primary-dark:#1B5E20;
            --danger:#D32F2F; --danger-light:#EF5350;
            --warning:#F57F17; --warning-light:#FFB300;
            --info:#0288D1;
            --surface:#FFFFFF; --background:#F1F8E9; --card-bg:#FFFFFF;
            --text-primary:#1A1A1A; --text-secondary:#666666;
            --border:#E0E0E0;
            --shadow:0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg:0 4px 16px rgba(0,0,0,0.15);
            --radius:12px; --radius-sm:8px;
        }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--background); color:var(--text-primary);
            min-height:100vh; overflow-x:hidden;
        }

        /* LOGIN SCREEN */
        .login-screen {
            position:fixed; inset:0; background:var(--primary);
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            z-index:9999; padding:40px 24px;
        }
        .login-screen.hidden { display:none; }
        .login-logo { font-size:72px; margin-bottom:16px; }
        .login-title { color:white; font-size:28px; font-weight:700; margin-bottom:8px; }
        .login-subtitle { color:rgba(255,255,255,0.8); font-size:15px; margin-bottom:40px; }
        .login-card {
            background:white; border-radius:20px; padding:28px 24px;
            width:100%; max-width:360px; box-shadow:var(--shadow-lg);
        }
        .login-label { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block; }
        .login-input {
            width:100%; padding:14px 16px; border:2px solid var(--border);
            border-radius:var(--radius); font-size:18px; font-weight:700;
            letter-spacing:2px; text-transform:uppercase; text-align:center;
            outline:none; margin-bottom:16px;
        }
        .login-input:focus { border-color:var(--primary); }
        .login-btn {
            width:100%; padding:14px; background:var(--primary); color:white;
            border:none; border-radius:var(--radius); font-size:16px;
            font-weight:700; cursor:pointer;
        }
        .login-error {
            color:var(--danger); font-size:13px; text-align:center;
            margin-top:12px; min-height:20px;
        }

        /* SYNC BAR */
        .sync-bar {
            position:fixed; top:0; left:0; right:0; height:36px;
            background:var(--primary-dark); color:white;
            display:flex; align-items:center; justify-content:center;
            font-size:13px; font-weight:500; z-index:200; display:none;
        }
        /* HEADER */
        .header {
            position:sticky; top:0; z-index:100;
            background:var(--primary); color:white;
            padding:12px 16px 8px; box-shadow:var(--shadow);
        }
        .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .header-title { font-size:20px; font-weight:700; }
        .header-actions { display:flex; gap:8px; }
        .header-btn {
            background:rgba(255,255,255,0.2); border:none; color:white;
            width:38px; height:38px; border-radius:50%; font-size:18px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .search-container {
            display:flex; align-items:center; background:rgba(255,255,255,0.95);
            border-radius:25px; padding:8px 14px; gap:8px;
        }
        .search-icon { font-size:16px; }
        .search-input { border:none; outline:none; flex:1; font-size:15px; background:transparent; color:var(--text-primary); }

        /* STATS BAR */
        .stats-bar {
            display:flex; gap:8px; padding:12px 16px; overflow-x:auto;
            background:white; border-bottom:1px solid var(--border);
        }
        .stats-bar::-webkit-scrollbar { display:none; }
        .stat-chip {
            flex-shrink:0; padding:6px 12px; border-radius:20px;
            font-size:13px; font-weight:600; cursor:pointer;
            background:#F5F5F5; color:var(--text-secondary);
            display:flex; align-items:center; gap:4px; white-space:nowrap;
        }
        .stat-chip.active.all { background:var(--primary); color:white; }
        .stat-chip.active.expired { background:var(--danger); color:white; }
        .stat-chip.active.expiring { background:var(--warning); color:white; }
        .stat-chip.active.low { background:var(--info); color:white; }

        /* CATEGORY TABS */
        .category-tabs {
            display:flex; gap:8px; padding:10px 16px; overflow-x:auto;
            background:white; border-bottom:1px solid var(--border);
        }
        .category-tabs::-webkit-scrollbar { display:none; }
        .cat-tab {
            flex-shrink:0; padding:6px 14px; border-radius:20px; font-size:13px;
            font-weight:600; cursor:pointer; background:#F5F5F5;
            color:var(--text-secondary); border:2px solid transparent; transition:all 0.2s;
        }
        .cat-tab.active { background:var(--primary); color:white; }

        /* PRODUCTS GRID */
        .products-container { padding:16px; }
        .products-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
            gap:12px;
        }
        .product-card {
            background:white; border-radius:var(--radius);
            padding:14px 12px; cursor:pointer;
            box-shadow:var(--shadow); border:2px solid transparent;
            transition:all 0.2s; position:relative;
        }
        .product-card.expired { border-color:var(--danger); background:#FFF8F8; }
        .product-card.expiring { border-color:var(--warning); background:#FFFDE7; }
        .product-card.low-stock { border-color:var(--info); background:#E3F2FD; }
        .card-emoji { font-size:36px; display:block; text-align:center; margin-bottom:8px; }
        .card-name {
            font-size:14px; font-weight:700; text-align:center;
            margin-bottom:4px; line-height:1.3;
            display:-webkit-box; -webkit-line-clamp:2;
            -webkit-box-orient:vertical; overflow:hidden;
        }
        .card-category { font-size:11px; color:var(--text-secondary); text-align:center; margin-bottom:8px; }
        .card-quantity {
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .qty-btn {
            width:28px; height:28px; border-radius:50%; border:none;
            font-size:18px; cursor:pointer; display:flex;
            align-items:center; justify-content:center; font-weight:700;
        }
        .qty-btn.minus { background:#FFEBEE; color:var(--danger); }
        .qty-btn.plus { background:#E8F5E9; color:var(--primary); }
        .qty-value { font-size:16px; font-weight:700; min-width:30px; text-align:center; }
        .card-expiry { font-size:11px; text-align:center; margin-top:6px; }
        .card-expiry.expired { color:var(--danger); font-weight:700; }
        .card-expiry.expiring { color:var(--warning); font-weight:700; }
        .card-expiry.ok { color:var(--primary); }
        .status-badge {
            position:absolute; top:8px; right:8px;
            font-size:14px; line-height:1;
        }

        /* LOADING */
        .loading-spinner {
            width:40px; height:40px; border:3px solid var(--border);
            border-top-color:var(--primary); border-radius:50%;
            animation:spin 0.8s linear infinite; margin:60px auto;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* FAB */
        .fab {
            position:fixed; bottom:24px; right:24px;
            width:60px; height:60px; border-radius:50%;
            background:var(--primary); color:white; border:none;
            font-size:28px; cursor:pointer; box-shadow:var(--shadow-lg);
            display:flex; align-items:center; justify-content:center;
            transition:transform 0.2s;
        }
        .fab:active { transform:scale(0.9); }

        /* MODAL */
        .modal-overlay {
            position:fixed; inset:0; z-index:300;
            background:rgba(0,0,0,0.5);
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .modal-overlay.active { opacity:1; pointer-events:all; }
        .modal {
            background:white; border-radius:20px 20px 0 0;
            padding:20px 20px 40px; width:100%; max-width:600px;
            max-height:90vh; overflow-y:auto;
            transform:translateY(100%); transition:transform 0.3s;
        }
        .modal-overlay.active .modal { transform:translateY(0); }
        .modal-handle { width:40px; height:4px; background:#DDD; border-radius:2px; margin:0 auto 16px; }
        .modal-title { font-size:20px; font-weight:700; margin-bottom:16px; }

        /* FORM */
        .form-group { margin-bottom:14px; }
        .form-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-secondary); }
        .form-input {
            width:100%; padding:12px 14px; border:2px solid var(--border);
            border-radius:var(--radius-sm); font-size:15px; outline:none;
            transition:border-color 0.2s; background:white;
        }
        .form-input:focus { border-color:var(--primary); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

        /* EMOJI GRID */
        .emoji-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
        .emoji-option {
            width:44px; height:44px; border-radius:var(--radius-sm);
            border:2px solid var(--border); display:flex;
            align-items:center; justify-content:center;
            font-size:24px; cursor:pointer; transition:all 0.2s;
        }
        .emoji-option.selected { border-color:var(--primary); background:#E8F5E9; }

        /* BTN */
        .btn {
            width:100%; padding:14px; border:none; border-radius:var(--radius);
            font-size:15px; font-weight:700; cursor:pointer; margin-bottom:10px;
            transition:opacity 0.2s;
        }
        .btn:active { opacity:0.8; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-secondary { background:#F5F5F5; color:var(--text-primary); }
        .btn-danger { background:var(--danger); color:white; }
        .btn-info { background:var(--info); color:white; }

        /* BARCODE BOX */
        .barcode-found-box {
            display:flex; align-items:center; gap:12px;
            background:#E8F5E9; border-radius:var(--radius);
            padding:12px 14px; margin-bottom:14px;
        }
        .barcode-found-emoji { font-size:36px; }
        .barcode-found-name { font-weight:700; font-size:15px; }
        .barcode-found-brand { font-size:13px; color:var(--text-secondary); }
        .barcode-found-code { font-size:11px; color:var(--text-secondary); font-family:monospace; }

        /* SCANNER */
        .scanner-container {
            width:100%; height:240px; background:#000;
            border-radius:var(--radius); overflow:hidden; position:relative;
            margin-bottom:14px;
        }
        .scanner-overlay {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center;
        }
        .scanner-frame {
            width:200px; height:120px; border:3px solid #4CAF50;
            border-radius:8px;
        }
        .scanner-line {
            position:absolute; width:180px; height:2px;
            background:rgba(76,175,80,0.8);
            animation:scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top:calc(50% - 55px); }
            100% { top:calc(50% + 55px); }
        }
        .scanner-status {
            text-align:center; font-size:14px; color:var(--text-secondary);
            margin-bottom:14px; min-height:20px;
        }

        /* DETAIL */
        .detail-emoji { font-size:64px; text-align:center; margin-bottom:8px; }
        .detail-name { font-size:22px; font-weight:700; text-align:center; margin-bottom:4px; }
        .detail-category { font-size:14px; color:var(--text-secondary); text-align:center; margin-bottom:16px; }
        .detail-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 0; border-bottom:1px solid var(--border); font-size:14px;
        }
        .detail-row-label { color:var(--text-secondary); }
        .detail-row-value { font-weight:600; }
        .detail-actions { display:flex; gap:10px; margin-top:16px; }
        .detail-actions .btn { margin-bottom:0; }

        /* NOTIF PANEL */
        .notif-panel {
            position:fixed; top:0; right:0; bottom:0; width:min(320px, 100vw);
            background:white; z-index:400; box-shadow:var(--shadow-lg);
            transform:translateX(100%); transition:transform 0.3s; overflow-y:auto;
        }
        .notif-panel.visible { transform:translateX(0); }
        .notif-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 16px; border-bottom:1px solid var(--border);
            font-weight:700; font-size:16px; position:sticky; top:0; background:white;
        }
        .notif-item { padding:12px 16px; border-bottom:1px solid var(--border); font-size:14px; }
        .notif-item.danger { border-left:4px solid var(--danger); }
        .notif-item.warning { border-left:4px solid var(--warning); }
        .notif-item.info { border-left:4px solid var(--info); }

        /* TOAST */
        .toast {
            position:fixed; bottom:100px; left:50%;
            transform:translateX(-50%) translateY(20px);
            background:#333; color:white; padding:12px 24px;
            border-radius:25px; font-size:14px; font-weight:500;
            z-index:9999; opacity:0; transition:all 0.3s;
            white-space:nowrap; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { background:var(--primary); }
        .toast.error { background:var(--danger); }
        .toast.warning { background:var(--warning); }
        .toast.info { background:var(--info); }

        /* EMPTY STATE */
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-secondary); }
        .empty-state-icon { font-size:64px; margin-bottom:16px; display:block; }
        .empty-state-title { font-size:20px; font-weight:600; margin-bottom:8px; color:var(--text-primary); }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
    <div class="login-logo">🏠</div>
    <div class="login-title">Dispensa di Casa</div>
    <div class="login-subtitle">Inserisci il codice della tua famiglia</div>
    <div class="login-card">
        <label class="login-label">Codice Famiglia</label>
        <input class="login-input" type="text" id="login-input"
               placeholder="ES. CESTA2024"
               onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" onclick="doLogin()">🚀 Accedi</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- SYNC BAR -->
<div class="sync-bar" id="sync-bar">⏳ Connessione in corso...</div>

<!-- HEADER -->
<div class="header" style="margin-top:0">
    <div class="header-top">
        <div class="header-title">🏠 <span id="header-family-name">Dispensa</span></div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleNotifPanel()" id="notif-btn">🔔</button>
            <button class="header-btn" onclick="exportData()">📤</button>
            <button class="header-btn" onclick="loadFromJsonBin()">🔄</button>
            <button class="header-btn" onclick="doLogout()" title="Cambia famiglia">🚪</button>
        </div>
    </div>
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Cerca prodotti..."
               id="search-input" oninput="renderProducts()">
    </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
    <div class="stat-chip all active" id="chip-all" onclick="filterByStatus('all')">
        🏠 Tutti <span id="count-all">0</span>
    </div>
    <div class="stat-chip expired" id="chip-expired" onclick="filterByStatus('expired')">
        ❌ Scaduti <span id="count-expired">0</span>
    </div>
    <div class="stat-chip expiring" id="chip-expiring" onclick="filterByStatus('expiring')">
        ⚠️ In scadenza <span id="count-expiring">0</span>
    </div>
    <div class="stat-chip low" id="chip-low" onclick="filterByStatus('low')">
        📉 Scorte basse <span id="count-low">0</span>
    </div>
</div>

<!-- CATEGORY TABS -->
<div class="category-tabs" id="category-tabs"></div>

<!-- PRODUCTS -->
<div class="products-container">
    <div class="products-grid" id="products-grid">
        <div style="grid-column:1/-1">
            <div class="loading-spinner"></div>
        </div>
    </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">＋</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notif-panel">
    <div class="notif-header">
        🔔 Notifiche
        <button onclick="toggleNotifPanel()"
                style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div id="notif-list"></div>
</div>

<!-- ===== MODAL: SCANNER ===== -->
<div class="modal-overlay" id="scanner-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2 class="modal-title">📷 Scansiona Barcode</h2>
        <div class="scanner-container">
            <video id="scanner-video" style="width:100%;height:100%;object-fit:cover;"></video>
            <div class="scanner-overlay">
                <div style="position:relative;display:flex;align-items:center;justify-content:center;">
                    <div class="scanner-frame"></div>
                    <div class="scanner-line"></div>
                </div>
            </div>
        </div>
        <div class="scanner-status" id="scanner-status">📷 Inquadra il codice a barre del prodotto</div>
        <button class="btn btn-secondary" onclick="closeScanner()">✕ Chiudi Scanner</button>
    </div>
</div>

<!-- ===== MODAL: AGGIUNGI/MODIFICA ===== -->
<div class="modal-overlay" id="add-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2 class="modal-title" id="add-modal-title">➕ Aggiungi Prodotto</h2>

        <div class="barcode-found-box" id="barcode-found-box" style="display:none">
            <div class="barcode-found-emoji" id="barcode-found-emoji">📦</div>
            <div class="barcode-found-info">
                <div class="barcode-found-name" id="barcode-found-name"></div>
                <div class="barcode-found-brand" id="barcode-found-brand"></div>
                <div class="barcode-found-code" id="barcode-found-code"></div>
            </div>
        </div>

        <button class="btn btn-info" onclick="openScanner()" style="margin-bottom:14px">
            📷 Scansiona Barcode
        </button>

        <div class="form-group">
            <label class="form-label">Nome Prodotto *</label>
            <input class="form-input" type="text" id="input-name" placeholder="Es. Pasta Barilla...">
        </div>

        <div class="form-group">
            <label class="form-label">Categoria</label>
            <select class="form-input" id="input-category">
                <option>🍝 Pasta & Riso</option>
                <option>🥫 Conserve</option>
                <option>🥛 Latticini</option>
                <option>🥩 Carne & Pesce</option>
                <option>🥦 Frutta & Verdura</option>
                <option>🧁 Dolci & Snack</option>
                <option>🧃 Bevande</option>
                <option>🫙 Condimenti</option>
                <option>🧊 Surgelati</option>
                <option>🍞 Pane & Cereali</option>
                <option>🧹 Pulizia Casa</option>
                <option>🧴 Igiene Personale</option>
                <option>💊 Farmaci</option>
                <option>🐾 Animali</option>
                <option>📦 Altro</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Emoji</label>
            <div class="emoji-grid" id="emoji-grid"></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Quantità</label>
                <input class="form-input" type="number" id="input-qty" placeholder="1" min="0" value="1">
            </div>
            <div class="form-group">
                <label class="form-label">Unità</label>
                <select class="form-input" id="input-unit">
                    <option>pz</option><option>kg</option><option>g</option>
                    <option>L</option><option>ml</option><option>conf</option>
                    <option>bst</option><option>bot</option><option>latt</option><option>vaso</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Scadenza</label>
                <input class="form-input" type="date" id="input-expiry">
            </div>
            <div class="form-group">
                <label class="form-label">Soglia minima</label>
                <input class="form-input" type="number" id="input-threshold" placeholder="2" min="0" value="2">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Note</label>
            <input class="form-input" type="text" id="input-notes" placeholder="Note opzionali...">
        </div>

        <button class="btn btn-primary" onclick="saveProduct()">💾 Salva Prodotto</button>
        <button class="btn btn-secondary" onclick="closeAddModal()">Annulla</button>
    </div>
</div>

<!-- ===== MODAL: DETTAGLIO ===== -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="detail-emoji" id="detail-emoji"></div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-category" id="detail-category"></div>
        <div id="detail-rows"></div>
        <div class="detail-actions">
            <button class="btn btn-primary" style="margin-bottom:0" onclick="editFromDetail()">✏️ Modifica</button>
            <button class="btn btn-danger" style="margin-bottom:0" onclick="deleteFromDetail()">🗑️ Elimina</button>
        </div>
        <button class="btn btn-secondary" style="margin-top:10px" onclick="closeDetail()">Chiudi</button>
    </div>
</div>

<script>
// ========== CONFIG ==========
const MASTER_BIN_ID = '69dcb182aaba882197f2d83f';
const MASTER_KEY    = '$2a$10$yAkIzU6bBTdv7q33Aj7CKe7QrQJcpq1UjR77JTuxJibH4EA.41vT.';
const BASE_URL      = 'https://api.jsonbin.io/v3/b';

// ========== STATE ==========
let products = [];
let editingId = null;
let currentFilter = 'all';
let currentCategory = 'all';
let selectedEmoji = '📦';
let codeReader = null;
let detailId = null;
let currentBinId = null;
let currentFamilyName = '';

const EMOJIS = ['🍝','🥫','🥛','🧀','🥩','🐟','🥚','🥦','🥕','🍎',
                '🍋','🧅','🧄','🍞','🥐','🧁','🍫','🍬','🧃','🥤',
                '☕','🫖','🍵','🧊','🫙','🛢️','🧹','🧴','💊','🐾','📦'];

const CATEGORY_EMOJIS = {
    '🍝 Pasta & Riso':'🍝','🥫 Conserve':'🥫','🥛 Latticini':'🥛',
    '🥩 Carne & Pesce':'🥩','🥦 Frutta & Verdura':'🥦','🧁 Dolci & Snack':'🧁',
    '🧃 Bevande':'🧃','🫙 Condimenti':'🫙','🧊 Surgelati':'🧊',
    '🍞 Pane & Cereali':'🍞','🧹 Pulizia Casa':'🧹','🧴 Igiene Personale':'🧴',
    '💊 Farmaci':'💊','🐾 Animali':'🐾','📦 Altro':'📦'
};

// ========== LOGIN ==========
async function doLogin() {
    const code = document.getElementById('login-input').value.trim().toUpperCase();
    if (!code) return;
    document.getElementById('login-error').textContent = '⏳ Verifica codice...';

    try {
        const res = await fetch(`${BASE_URL}/${MASTER_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': MASTER_KEY }
        });
        if (!res.ok) throw new Error('Errore master');
        const data = await res.json();
        const famiglie = data.record.famiglie || {};

        if (!famiglie[code]) {
            document.getElementById('login-error').textContent = '❌ Codice non valido';
            return;
        }

        const famiglia = famiglie[code];
        currentBinId = famiglia.binId;
        currentFamilyName = famiglia.nome;

        localStorage.setItem('dispensa_code', code);
        localStorage.setItem('dispensa_bin', currentBinId);
        localStorage.setItem('dispensa_name', currentFamilyName);

        showApp();
    } catch(e) {
        document.getElementById('login-error').textContent = '❌ Errore di connessione';
    }
}

function doLogout() {
    localStorage.removeItem('dispensa_code');
    localStorage.removeItem('dispensa_bin');
    localStorage.removeItem('dispensa_name');
    products = [];
    currentBinId = null;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-input').value = '';
    document.getElementById('login-error').textContent = '';
}

function showApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('header-family-name').textContent = currentFamilyName;
    loadFromJsonBin();
    setInterval(loadFromJsonBin, 60000);
    setInterval(checkNotifications, 300000);
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
    renderEmojiGrid();

    const savedCode = localStorage.getItem('dispensa_code');
    const savedBin  = localStorage.getItem('dispensa_bin');
    const savedName = localStorage.getItem('dispensa_name');

    if (savedCode && savedBin && savedName) {
        currentBinId = savedBin;
        currentFamilyName = savedName;
        showApp();
    }
    // altrimenti mostra login screen (già visibile di default)
});

// ========== JSONBIN ==========
async function loadFromJsonBin() {
    if (!currentBinId) return;
    try {
        showSyncBar('🔄 Sincronizzazione...');
        const res = await fetch(`${BASE_URL}/${currentBinId}/latest`, {
            headers: { 'X-Master-Key': MASTER_KEY }
        });
        if (!res.ok) throw new Error('Errore fetch');
        const data = await res.json();
        products = data.record.products || [];
        hideSyncBar();
        renderAll();
        checkNotifications();
    } catch(e) {
        hideSyncBar();
        showToast('⚠️ Offline - dati locali', 'warning');
        renderAll();
    }
}

async function saveToJsonBin() {
    if (!currentBinId) return;
    try {
        showSyncBar('💾 Salvataggio...');
        const res = await fetch(`${BASE_URL}/${currentBinId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': MASTER_KEY
            },
            body: JSON.stringify({ products })
        });
        if (!res.ok) throw new Error('Errore salvataggio');
        hideSyncBar();
    } catch(e) {
        hideSyncBar();
        showToast('❌ Errore salvataggio', 'error');
    }
}

// ========== RENDER ==========
function renderAll() {
    renderStats();
    renderCategoryTabs();
    renderProducts();
}

function renderStats() {
    const today = new Date(); today.setHours(0,0,0,0);
    const in7 = new Date(today); in7.setDate(in7.getDate()+7);

    let expired=0, expiring=0, low=0;
    products.forEach(p => {
        if (p.expiry && new Date(p.expiry) < today) expired++;
        else if (p.expiry && new Date(p.expiry) <= in7) expiring++;
        if (p.qty <= p.threshold) low++;
    });

    document.getElementById('count-all').textContent = products.length;
    document.getElementById('count-expired').textContent = expired;
    document.getElementById('count-expiring').textContent = expiring;
    document.getElementById('count-low').textContent = low;
}

function renderCategoryTabs() {
    const cats = ['all', ...new Set(products.map(p => p.category))];
    const tabs = document.getElementById('category-tabs');
    tabs.innerHTML = cats.map(c => `
        <div class="cat-tab ${c === currentCategory ? 'active' : ''}"
             onclick="filterByCategory('${c}')">
            ${c === 'all' ? '🏠 Tutti' : c}
        </div>
    `).join('');
}

function renderProducts() {
    const grid = document.getElementById('products-grid');
    const search = document.getElementById('search-input').value.toLowerCase();
    const today = new Date(); today.setHours(0,0,0,0);
    const in7 = new Date(today); in7.setDate(in7.getDate()+7);

    let filtered = products.filter(p => {
        if (search && !p.name.toLowerCase().includes(search) &&
            !p.category.toLowerCase().includes(search)) return false;
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        if (currentFilter === 'expired') return p.expiry && new Date(p.expiry) < today;
        if (currentFilter === 'expiring') {
            const d = p.expiry ? new Date(p.expiry) : null;
            return d && d >= today && d <= in7;
        }
        if (currentFilter === 'low') return p.qty <= p.threshold;
        return true;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1">
                <div class="empty-state">
                    <span class="empty-state-icon">📦</span>
                    <div class="empty-state-title">Nessun prodotto trovato</div>
                    <p>Aggiungi il tuo primo prodotto con il pulsante +</p>
                </div>
            </div>`;
        return;
    }

    grid.innerHTML = filtered.map(p => {
        const exp = p.expiry ? new Date(p.expiry) : null;
        const isExpired  = exp && exp < today;
        const isExpiring = exp && exp >= today && exp <= in7;
        const isLow      = p.qty <= p.threshold;

        let cardClass = '';
        if (isExpired) cardClass = 'expired';
        else if (isExpiring) cardClass = 'expiring';
        else if (isLow) cardClass = 'low-stock';

        let expiryHtml = '';
        if (exp) {
            const cls = isExpired ? 'expired' : isExpiring ? 'expiring' : 'ok';
            expiryHtml = `<div class="card-expiry ${cls}">📅 ${formatDate(p.expiry)}</div>`;
        }

        let badge = '';
        if (isExpired) badge = '<div class="status-badge">❌</div>';
        else if (isExpiring) badge = '<div class="status-badge">⚠️</div>';
        else if (isLow) badge = '<div class="status-badge">📉</div>';

        return `
            <div class="product-card ${cardClass}" onclick="openDetail('${p.id}')">
                ${badge}
                <span class="card-emoji">${p.emoji || '📦'}</span>
                <div class="card-name">${p.name}</div>
                <div class="card-category">${p.category}</div>
                <div class="card-quantity" onclick="event.stopPropagation()">
                    <button class="qty-btn minus" onclick="changeQty('${p.id}',-1)">−</button>
                    <span class="qty-value">${p.qty} ${p.unit}</span>
                    <button class="qty-btn plus" onclick="changeQty('${p.id}',1)">+</button>
                </div>
                ${expiryHtml}
            </div>`;
    }).join('');
}

// ========== FILTRI ==========
function filterByStatus(status) {
    currentFilter = status;
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
    document.getElementById(`chip-${status}`).classList.add('active');
    renderProducts();
}

function filterByCategory(cat) {
    currentCategory = cat;
    renderCategoryTabs();
    renderProducts();
}

// ========== QUANTITÀ ==========
async function changeQty(id, delta) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    p.qty = Math.max(0, p.qty + delta);
    renderAll();
    await saveToJsonBin();
}

// ========== MODAL AGGIUNGI ==========
function openAddModal() {
    editingId = null;
    document.getElementById('add-modal-title').textContent = '➕ Aggiungi Prodotto';
    document.getElementById('input-name').value = '';
    document.getElementById('input-category').value = '📦 Altro';
    document.getElementById('input-qty').value = '1';
    document.getElementById('input-unit').value = 'pz';
    document.getElementById('input-expiry').value = '';
    document.getElementById('input-threshold').value = '2';
    document.getElementById('input-notes').value = '';
    document.getElementById('barcode-found-box').style.display = 'none';
    selectedEmoji = '📦';
    renderEmojiGrid();
    document.getElementById('add-modal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('add-modal').classList.remove('active');
    editingId = null;
}

function renderEmojiGrid() {
    const grid = document.getElementById('emoji-grid');
    if (!grid) return;
    grid.innerHTML = EMOJIS.map(e => `
        <div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}"
             onclick="selectEmoji('${e}')">${e}</div>
    `).join('');
}

function selectEmoji(e) {
    selectedEmoji = e;
    renderEmojiGrid();
}

async function saveProduct() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) { showToast('⚠️ Inserisci il nome!', 'warning'); return; }

    const product = {
        id: editingId || Date.now().toString(),
        name,
        category: document.getElementById('input-category').value,
        emoji: selectedEmoji,
        qty: parseFloat(document.getElementById('input-qty').value) || 0,
        unit: document.getElementById('input-unit').value,
        expiry: document.getElementById('input-expiry').value,
        threshold: parseFloat(document.getElementById('input-threshold').value) || 2,
        notes: document.getElementById('input-notes').value.trim(),
        updatedAt: new Date().toISOString()
    };

    if (editingId) {
        const i = products.findIndex(p => p.id === editingId);
        if (i !== -1) products[i] = product;
        showToast('✅ Prodotto aggiornato!', 'success');
    } else {
        products.push(product);
        showToast('✅ Prodotto aggiunto!', 'success');
    }

    closeAddModal();
    renderAll();
    await saveToJsonBin();
}

// ========== DETAIL MODAL ==========
function openDetail(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    detailId = id;
    const today = new Date(); today.setHours(0,0,0,0);

    document.getElementById('detail-emoji').textContent = p.emoji || '📦';
    document.getElementById('detail-name').textContent = p.name;
    document.getElementById('detail-category').textContent = p.category;

    const exp = p.expiry ? new Date(p.expiry) : null;
    const isExpired  = exp && exp < today;
    const isExpiring = exp && exp >= today && new Date(today.getTime()+7*864e5) >= exp;

    let rows = `
        <div class="detail-row">
            <span class="detail-row-label">Quantità</span>
            <span class="detail-row-value">${p.qty} ${p.unit}</span>
        </div>
        <div class="detail-row">
            <span class="detail-row-label">Soglia minima</span>
            <span class="detail-row-value">${p.threshold} ${p.unit}</span>
        </div>`;

    if (p.expiry) {
        const color = isExpired ? 'var(--danger)' : isExpiring ? 'var(--warning)' : 'var(--primary)';
        rows += `
            <div class="detail-row">
                <span class="detail-row-label">Scadenza</span>
                <span class="detail-row-value" style="color:${color}">${formatDate(p.expiry)}
                    ${isExpired ? ' ❌' : isExpiring ? ' ⚠️' : ''}</span>
            </div>`;
    }
    if (p.notes) {
        rows += `
            <div class="detail-row">
                <span class="detail-row-label">Note</span>
                <span class="detail-row-value">${p.notes}</span>
            </div>`;
    }

    document.getElementById('detail-rows').innerHTML = rows;
    document.getElementById('detail-modal').classList.add('active');
}

function closeDetail() {
    document.getElementById('detail-modal').classList.remove('active');
    detailId = null;
}

function editFromDetail() {
    const p = products.find(x => x.id === detailId);
    if (!p) return;
    closeDetail();
    editingId = p.id;
    document.getElementById('add-modal-title').textContent = '✏️ Modifica Prodotto';
    document.getElementById('input-name').value = p.name;
    document.getElementById('input-category').value = p.category;
    document.getElementById('input-qty').value = p.qty;
    document.getElementById('input-unit').value = p.unit;
    document.getElementById('input-expiry').value = p.expiry || '';
    document.getElementById('input-threshold').value = p.threshold;
    document.getElementById('input-notes').value = p.notes || '';
    document.getElementById('barcode-found-box').style.display = 'none';
    selectedEmoji = p.emoji || '📦';
    renderEmojiGrid();
    document.getElementById('add-modal').classList.add('active');
}

async function deleteFromDetail() {
    if (!confirm('Eliminare questo prodotto?')) return;
    products = products.filter(p => p.id !== detailId);
    closeDetail();
    renderAll();
    await saveToJsonBin();
    showToast('🗑️ Prodotto eliminato', 'info');
}

// ========== SCANNER ==========
function openScanner() {
    document.getElementById('scanner-modal').classList.add('active');
    startScanner();
}

function closeScanner() {
    document.getElementById('scanner-modal').classList.remove('active');
    stopScanner();
}

async function startScanner() {
    try {
        codeReader = new ZXing.BrowserMultiFormatReader();
        const devices = await codeReader.listVideoInputDevices();
        const deviceId = devices.length > 1 ? devices[devices.length-1].deviceId : devices[0]?.deviceId;
        await codeReader.decodeFromVideoDevice(deviceId, 'scanner-video', async (result, err) => {
            if (result) {
                const code = result.getText();
                document.getElementById('scanner-status').textContent = `✅ Codice: ${code}`;
                stopScanner();
                document.getElementById('scanner-modal').classList.remove('active');
                await lookupBarcode(code);
            }
        });
    } catch(e) {
        document.getElementById('scanner-status').textContent = '❌ Camera non disponibile';
    }
}

function stopScanner() {
    if (codeReader) { codeReader.reset(); codeReader = null; }
}

async function lookupBarcode(code) {
    showToast('🔍 Ricerca prodotto...', 'info');
    try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
        const data = await res.json();
        if (data.status === 1) {
            const p = data.product;
            const name = p.product_name_it || p.product_name || p.generic_name || '';
            const brand = p.brands || '';
            const tags = [...(p.categories_tags||[]), ...(p.labels_tags||[])];
            const category = mapCategory(tags);
            const emoji = CATEGORY_EMOJIS[category] || '📦';
            fillFormFromBarcode(name, brand, category, emoji, code);
        } else {
            fillFormFromBarcode('', '', '📦 Altro', '📦', code);
            showToast('⚠️ Prodotto non trovato nel database', 'warning');
        }
    } catch(e) {
        fillFormFromBarcode('', '', '📦 Altro', '📦', code);
        showToast('⚠️ Ricerca offline non disponibile', 'warning');
    }
}

function mapCategory(tags) {
    const t = tags.join(' ').toLowerCase();
    if (t.includes('pasta') || t.includes('rice') || t.includes('riso')) return '🍝 Pasta & Riso';
    if (t.includes('conserv') || t.includes('canned')) return '🥫 Conserve';
    if (t.includes('milk') || t.includes('latte') || t.includes('dairy')) return '🥛 Latticini';
    if (t.includes('meat') || t.includes('carne') || t.includes('fish') || t.includes('pesce')) return '🥩 Carne & Pesce';
    if (t.includes('fruit') || t.includes('vegetable') || t.includes('frutta') || t.includes('verdura')) return '🥦 Frutta & Verdura';
    if (t.includes('sweet') || t.includes('snack') || t.includes('dolci') || t.includes('biscuit')) return '🧁 Dolci & Snack';
    if (t.includes('drink') || t.includes('beverage') || t.includes('bevanda') || t.includes('juice')) return '🧃 Bevande';
    if (t.includes('bread') || t.includes('pane') || t.includes('cereal')) return '🍞 Pane & Cereali';
    if (t.includes('sauce') || t.includes('condiment') || t.includes('oil') || t.includes('olio')) return '🫙 Condimenti';
    if (t.includes('frozen') || t.includes('surgelat')) return '🧊 Surgelati';
    return '📦 Altro';
}

function fillFormFromBarcode(name, brand, category, emoji, code) {
    if (name) document.getElementById('input-name').value = name;
    if (category) document.getElementById('input-category').value = category;
    selectedEmoji = emoji;
    renderEmojiGrid();
    document.getElementById('barcode-found-box').style.display = 'flex';
    document.getElementById('barcode-found-name').textContent = name || 'Prodotto sconosciuto';
    document.getElementById('barcode-found-brand').textContent = brand || '';
    document.getElementById('barcode-found-emoji').textContent = emoji;
    document.getElementById('barcode-found-code').textContent = code;
    document.getElementById('add-modal').classList.add('active');
}

// ========== NOTIFICHE ==========
function checkNotifications() {
    const today = new Date(); today.setHours(0,0,0,0);
    const in7 = new Date(today); in7.setDate(in7.getDate()+7);
    const list = document.getElementById('notif-list');
    let items = '';
    let count = 0;

    products.forEach(p => {
        const exp = p.expiry ? new Date(p.expiry) : null;
        if (exp && exp < today) {
            items += `<div class="notif-item danger">❌ <b>${p.name}</b> — scaduto il ${formatDate(p.expiry)}</div>`;
            count++;
        } else if (exp && exp <= in7) {
            items += `<div class="notif-item warning">⚠️ <b>${p.name}</b> — scade il ${formatDate(p.expiry)}</div>`;
            count++;
        }
        if (p.qty <= p.threshold) {
            items += `<div class="notif-item info">📉 <b>${p.name}</b> — scorta bassa (${p.qty} ${p.unit})</div>`;
            count++;
        }
    });

    list.innerHTML = items || '<div style="padding:20px;text-align:center;color:#999">✅ Tutto ok!</div>';
    const btn = document.getElementById('notif-btn');
    btn.textContent = count > 0 ? `🔔 ${count}` : '🔔';
}

function toggleNotifPanel() {
    document.getElementById('notif-panel').classList.toggle('visible');
    checkNotifications();
}

// ========== EXPORT ==========
function exportData() {
    const json = JSON.stringify({ products }, null, 2);
    const blob = new Blob([json], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dispensa_${currentFamilyName.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📤 Export completato!', 'success');
}

// ========== UTILS ==========
function formatDate(s) {
    if (!s) return '';
    const [y,m,d] = s.split('-');
    return `${d}/${m}/${y}`;
}

function showSyncBar(msg) {
    const bar = document.getElementById('sync-bar');
    bar.textContent = msg;
    bar.style.display = 'flex';
    document.querySelector('.header').style.marginTop = '36px';
}

function hideSyncBar() {
    document.getElementById('sync-bar').style.display = 'none';
    document.querySelector('.header').style.marginTop = '0';
}

let toastTimer;
function showToast(msg, type='info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
        if (e.target === overlay) {
            overlay.classList.remove('active');
            if (overlay.id === 'scanner-modal') closeScanner();
        }
    });
});
</script>

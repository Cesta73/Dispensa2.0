<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Dispensa di Casa</title>
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dispensa">
    <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --primary:#2E7D32; --primary-light:#4CAF50; --primary-dark:#1B5E20;
            --danger:#D32F2F; --danger-light:#EF5350;
            --warning:#F57F17; --warning-light:#FFB300;
            --info:#0288D1;
            --surface:#FFFFFF; --background:#F1F8E9; --card-bg:#FFFFFF;
            --text-primary:#1A1A1A; --text-secondary:#666666;
            --border:#E0E0E0;
            --shadow:0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg:0 4px 16px rgba(0,0,0,0.15);
            --radius:12px; --radius-sm:8px;
        }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--background); color:var(--text-primary);
            min-height:100vh; overflow-x:hidden;
        }
        /* SYNC BAR */
        .sync-bar {
            position:fixed; top:0; left:0; right:0; z-index:500;
            background:var(--warning); color:white;
            text-align:center; padding:8px 16px; font-size:13px; font-weight:600;
            display:none;
        }
        /* HEADER */
        .header {
            background:var(--primary); color:white;
            padding:16px 20px 12px; position:sticky; top:0; z-index:100;
            box-shadow:var(--shadow);
        }
        .header-top {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:10px;
        }
        .header-title { font-size:20px; font-weight:700; }
        .header-actions { display:flex; gap:8px; }
        .header-btn {
            background:rgba(255,255,255,0.2); border:none; color:white;
            width:36px; height:36px; border-radius:50%; font-size:18px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .search-container {
            display:flex; align-items:center; gap:8px;
            background:rgba(255,255,255,0.15);
            border-radius:25px; padding:8px 14px;
        }
        .search-icon { font-size:16px; }
        .search-input {
            background:transparent; border:none; outline:none;
            color:white; font-size:15px; width:100%;
        }
        .search-input::placeholder { color:rgba(255,255,255,0.7); }
        /* STATS BAR */
        .stats-bar {
            display:flex; gap:8px; padding:12px 16px;
            overflow-x:auto; background:white;
            border-bottom:1px solid var(--border);
        }
        .stats-bar::-webkit-scrollbar { display:none; }
        .stat-chip {
            display:flex; align-items:center; gap:6px;
            padding:6px 14px; border-radius:20px; font-size:13px;
            font-weight:600; white-space:nowrap; cursor:pointer;
            border:2px solid transparent; transition:all 0.2s;
            background:#F5F5F5; color:var(--text-secondary);
        }
        .stat-chip.active { background:var(--primary); color:white; }
        .stat-chip.expired.active { background:var(--danger); }
        .stat-chip.expiring.active { background:var(--warning); }
        .stat-chip.low.active { background:var(--info); }
        /* CATEGORY TABS */
        .category-tabs {
            display:flex; gap:8px; padding:10px 16px;
            overflow-x:auto; background:white;
            border-bottom:1px solid var(--border);
        }
        .category-tabs::-webkit-scrollbar { display:none; }
        .cat-tab {
            padding:6px 14px; border-radius:20px; font-size:13px;
            font-weight:600; white-space:nowrap; cursor:pointer;
            background:#F5F5F5; color:var(--text-secondary);
            border:2px solid transparent; transition:all 0.2s;
        }
        .cat-tab.active { background:var(--primary); color:white; }
        /* PRODUCTS GRID */
        .products-container { padding:16px; }
        .products-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
            gap:12px;
        }
        .product-card {
            background:white; border-radius:var(--radius);
            padding:14px 12px; cursor:pointer;
            box-shadow:var(--shadow); border:2px solid transparent;
            transition:all 0.2s; position:relative;
        }
        .product-card.expired { border-color:var(--danger); background:#FFF8F8; }
        .product-card.expiring { border-color:var(--warning); background:#FFFDE7; }
        .product-card.low-stock { border-color:var(--info); background:#E3F2FD; }
        .card-emoji { font-size:36px; display:block; text-align:center; margin-bottom:8px; }
        .card-name {
            font-size:14px; font-weight:700; text-align:center;
            margin-bottom:4px; line-height:1.3;
            display:-webkit-box; -webkit-line-clamp:2;
            -webkit-box-orient:vertical; overflow:hidden;
        }
        .card-category {
            font-size:11px; color:var(--text-secondary);
            text-align:center; margin-bottom:8px;
        }
        .card-quantity {
            display:flex; align-items:center; justify-content:center;
            gap:8px; margin-bottom:8px;
        }
        .qty-btn {
            width:28px; height:28px; border-radius:50%; border:none;
            font-size:16px; cursor:pointer; display:flex;
            align-items:center; justify-content:center; font-weight:700;
        }
        .qty-btn.minus { background:#FFEBEE; color:var(--danger); }
        .qty-btn.plus { background:#E8F5E9; color:var(--primary); }
        .qty-value { font-size:15px; font-weight:700; min-width:30px; text-align:center; }
        .card-expiry {
            font-size:11px; text-align:center; padding:3px 8px;
            border-radius:10px; background:#F5F5F5; color:var(--text-secondary);
        }
        .card-expiry.expired { background:#FFEBEE; color:var(--danger); font-weight:700; }
        .card-expiry.expiring { background:#FFF9C4; color:var(--warning); font-weight:700; }
        /* LOADING */
        .loading-spinner {
            width:40px; height:40px; border:4px solid var(--border);
            border-top-color:var(--primary); border-radius:50%;
            animation:spin 0.8s linear infinite; margin:40px auto;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* FAB */
        .fab {
            position:fixed; bottom:24px; right:24px; z-index:200;
            width:60px; height:60px; border-radius:50%;
            background:var(--primary); color:white; border:none;
            font-size:28px; cursor:pointer; box-shadow:var(--shadow-lg);
            display:flex; align-items:center; justify-content:center;
            transition:transform 0.2s;
        }
        .fab:active { transform:scale(0.9); }
        /* MODAL */
        .modal-overlay {
            position:fixed; inset:0; z-index:300;
            background:rgba(0,0,0,0.5);
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .modal-overlay.active { opacity:1; pointer-events:all; }
        .modal {
            background:white; border-radius:20px 20px 0 0;
            padding:20px 20px 40px; width:100%; max-width:600px;
            max-height:90vh; overflow-y:auto;
            transform:translateY(100%); transition:transform 0.3s;
        }
        .modal-overlay.active .modal { transform:translateY(0); }
        .modal-handle {
            width:40px; height:4px; background:#DDD;
            border-radius:2px; margin:0 auto 16px;
        }
        .modal-title { font-size:20px; font-weight:700; margin-bottom:16px; }
        /* FORM */
        .form-group { margin-bottom:14px; }
        .form-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-secondary); }
        .form-input {
            width:100%; padding:12px 14px; border:2px solid var(--border);
            border-radius:var(--radius-sm); font-size:15px;
            outline:none; transition:border-color 0.2s;
            font-family:inherit;
        }
        .form-input:focus { border-color:var(--primary); }
        .form-row { display:flex; gap:10px; }
        .form-row .form-group { flex:1; }
        /* EMOJI GRID */
        .emoji-grid {
            display:grid; grid-template-columns:repeat(8,1fr); gap:6px;
        }
        .emoji-option {
            aspect-ratio:1; display:flex; align-items:center;
            justify-content:center; font-size:22px; border-radius:8px;
            cursor:pointer; border:2px solid transparent; transition:all 0.15s;
        }
        .emoji-option.selected { border-color:var(--primary); background:#E8F5E9; }
        /* BTN */
        .btn {
            width:100%; padding:14px; border:none; border-radius:var(--radius);
            font-size:16px; font-weight:700; cursor:pointer;
            margin-bottom:10px; transition:opacity 0.2s;
        }
        .btn:active { opacity:0.8; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-secondary { background:#F5F5F5; color:var(--text-primary); }
        .btn-danger { background:var(--danger); color:white; }
        .btn-info { background:var(--info); color:white; }
        /* DETAIL */
        .detail-emoji { font-size:72px; text-align:center; margin-bottom:8px; }
        .detail-name { font-size:22px; font-weight:700; text-align:center; margin-bottom:4px; }
        .detail-category { font-size:14px; color:var(--text-secondary); text-align:center; margin-bottom:20px; }
        .detail-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:12px 0; border-bottom:1px solid var(--border); font-size:15px;
        }
        .detail-row:last-child { border-bottom:none; }
        .detail-label { color:var(--text-secondary); }
        .detail-value { font-weight:600; }
        .detail-actions { display:flex; gap:10px; margin-top:20px; }
        .detail-actions .btn { margin-bottom:0; }
        /* SCANNER */
        .scanner-container {
            width:100%; height:260px; background:#000;
            border-radius:var(--radius); overflow:hidden;
            position:relative; margin-bottom:16px;
        }
        .scanner-overlay {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center; pointer-events:none;
        }
        .scanner-frame {
            width:200px; height:120px; border:3px solid white;
            border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.4);
        }
        .scanner-line {
            position:absolute; width:180px; height:2px;
            background:var(--primary-light); animation:scan 2s linear infinite;
        }
        @keyframes scan {
            0%,100% { transform:translateY(-50px); }
            50% { transform:translateY(50px); }
        }
        .scanner-status {
            text-align:center; padding:10px; font-size:14px;
            font-weight:600; margin-bottom:12px; border-radius:8px;
            background:#F5F5F5;
        }
        .scanner-status.loading { background:#E3F2FD; color:var(--info); }
        .scanner-status.error { background:#FFEBEE; color:var(--danger); }
        .scanner-status.success { background:#E8F5E9; color:var(--primary); }
        /* BARCODE FOUND BOX */
        .barcode-found-box {
            background:#E8F5E9; border-radius:var(--radius-sm);
            padding:12px; margin-bottom:14px;
            display:flex; align-items:center; gap:10px;
        }
        .barcode-found-emoji { font-size:32px; }
        .barcode-found-info { flex:1; }
        .barcode-found-name { font-weight:700; font-size:15px; }
        .barcode-found-brand { font-size:13px; color:var(--text-secondary); }
        .barcode-found-code { font-size:11px; color:var(--text-secondary); font-family:monospace; }
        /* NOTIFICATION PANEL */
        .notif-panel {
            position:fixed; top:0; right:0; bottom:0;
            width:300px; background:white; z-index:400;
            box-shadow:var(--shadow-lg); transform:translateX(100%);
            transition:transform 0.3s; overflow-y:auto;
        }
        .notif-panel.visible { transform:translateX(0); }
        .notif-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 16px; border-bottom:1px solid var(--border);
            font-weight:700; font-size:16px; position:sticky; top:0; background:white;
        }
        .notif-item {
            padding:12px 16px; border-bottom:1px solid var(--border); font-size:14px;
        }
        .notif-item.danger { border-left:4px solid var(--danger); }
        .notif-item.warning { border-left:4px solid var(--warning); }
        .notif-item.info { border-left:4px solid var(--info); }
        /* TOAST */
        .toast {
            position:fixed; bottom:100px; left:50%;
            transform:translateX(-50%) translateY(20px);
            background:#333; color:white; padding:12px 24px;
            border-radius:25px; font-size:14px; font-weight:500;
            z-index:9999; opacity:0; transition:all 0.3s;
            white-space:nowrap; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { background:var(--primary); }
        .toast.error { background:var(--danger); }
        .toast.warning { background:var(--warning); }
        .toast.info { background:var(--info); }
        /* EMPTY STATE */
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-secondary); }
        .empty-state-icon { font-size:64px; margin-bottom:16px; display:block; }
        .empty-state-title { font-size:20px; font-weight:600; margin-bottom:8px; color:var(--text-primary); }
    </style>
</head>
<body>

<!-- SYNC BAR -->
<div class="sync-bar" id="sync-bar">⏳ Connessione in corso...</div>

<!-- HEADER -->
<div class="header" style="margin-top:0">
    <div class="header-top">
        <div class="header-title">🏠 Dispensa di Casa</div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleNotifPanel()" id="notif-btn">🔔</button>
            <button class="header-btn" onclick="exportData()">📤</button>
            <button class="header-btn" onclick="loadFromJsonBin()">🔄</button>
        </div>
    </div>
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Cerca prodotti..."
               id="search-input" oninput="renderProducts()">
    </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
    <div class="stat-chip all active" id="chip-all" onclick="filterByStatus('all')">
        🏠 Tutti <span id="count-all">0</span>
    </div>
    <div class="stat-chip expired" id="chip-expired" onclick="filterByStatus('expired')">
        ❌ Scaduti <span id="count-expired">0</span>
    </div>
    <div class="stat-chip expiring" id="chip-expiring" onclick="filterByStatus('expiring')">
        ⚠️ In scadenza <span id="count-expiring">0</span>
    </div>
    <div class="stat-chip low" id="chip-low" onclick="filterByStatus('low')">
        📉 Scorte basse <span id="count-low">0</span>
    </div>
</div>

<!-- CATEGORY TABS -->
<div class="category-tabs" id="category-tabs"></div>

<!-- PRODUCTS -->
<div class="products-container">
    <div class="products-grid" id="products-grid">
        <div style="grid-column:1/-1">
            <div class="loading-spinner"></div>
        </div>
    </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()">＋</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notif-panel">
    <div class="notif-header">
        🔔 Notifiche
        <button onclick="toggleNotifPanel()"
                style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div id="notif-list"></div>
</div>

<!-- ===== MODAL: SCANNER ===== -->
<div class="modal-overlay" id="scanner-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2 class="modal-title">📷 Scansiona Barcode</h2>
        <div class="scanner-container">
            <video id="scanner-video" style="width:100%;height:100%;object-fit:cover;"></video>
            <div class="scanner-overlay">
                <div style="position:relative;display:flex;align-items:center;justify-content:center;">
                    <div class="scanner-frame"></div>
                    <div class="scanner-line"></div>
                </div>
            </div>
        </div>
        <div class="scanner-status" id="scanner-status">📷 Inquadra il codice a barre del prodotto</div>
        <button class="btn btn-secondary" onclick="closeScanner()">✕ Chiudi Scanner</button>
    </div>
</div>

<!-- ===== MODAL: AGGIUNGI/MODIFICA ===== -->
<div class="modal-overlay" id="add-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2 class="modal-title" id="add-modal-title">➕ Aggiungi Prodotto</h2>

        <!-- Barcode found box -->
        <div class="barcode-found-box" id="barcode-found-box" style="display:none">
            <div class="barcode-found-emoji" id="barcode-found-emoji">📦</div>
            <div class="barcode-found-info">
                <div class="barcode-found-name" id="barcode-found-name"></div>
                <div class="barcode-found-brand" id="barcode-found-brand"></div>
                <div class="barcode-found-code" id="barcode-found-code"></div>
            </div>
        </div>

        <button class="btn btn-info" onclick="openScanner()" style="margin-bottom:14px">
            📷 Scansiona Barcode
        </button>

        <div class="form-group">
            <label class="form-label">Nome Prodotto *</label>
            <input class="form-input" type="text" id="input-name" placeholder="Es. Pasta Barilla...">
        </div>

        <div class="form-group">
            <label class="form-label">Categoria</label>
            <select class="form-input" id="input-category">
                <option>🍝 Pasta & Riso</option>
                <option>🥫 Conserve</option>
                <option>🥛 Latticini</option>
                <option>🥩 Carne & Pesce</option>
                <option>🥦 Frutta & Verdura</option>
                <option>🧁 Dolci & Snack</option>
                <option>🧃 Bevande</option>
                <option>🫙 Condimenti</option>
                <option>🧊 Surgelati</option>
                <option>🍞 Pane & Cereali</option>
                <option>🧹 Pulizia Casa</option>
                <option>🧴 Igiene Personale</option>
                <option>💊 Farmaci</option>
                <option>🐾 Animali</option>
                <option>📦 Altro</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Emoji</label>
            <div class="emoji-grid" id="emoji-grid"></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Quantità</label>
                <input class="form-input" type="number" id="input-qty"
                       placeholder="1" min="0" value="1">
            </div>
            <div class="form-group">
                <label class="form-label">Unità</label>
                <select class="form-input" id="input-unit">
                    <option>pz</option>
                    <option>kg</option>
                    <option>g</option>
                    <option>L</option>
                    <option>ml</option>
                    <option>conf</option>
                    <option>bst</option>
                    <option>bot</option>
                    <option>latt</option>
                    <option>vaso</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Scadenza</label>
                <input class="form-input" type="date" id="input-expiry">
            </div>
            <div class="form-group">
                <label class="form-label">Soglia minima</label>
                <input class="form-input" type="number" id="input-threshold"
                       placeholder="2" min="0" value="2">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Note</label>
            <input class="form-input" type="text" id="input-notes"
                   placeholder="Note opzionali...">
        </div>

        <button class="btn btn-primary" onclick="saveProduct()">💾 Salva Prodotto</button>
        <button class="btn btn-secondary" onclick="closeAddModal()">Annulla</button>
    </div>
</div>

<!-- ===== MODAL: DETTAGLIO ===== -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="detail-emoji" id="detail-emoji"></div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-category" id="detail-category"></div>
        <div id="detail-rows"></div>
        <div class="detail-actions">
            <button class="btn btn-primary" style="margin-bottom:0"
                    onclick="editFromDetail()">✏️ Modifica</button>
            <button class="btn btn-danger" style="margin-bottom:0"
                    onclick="deleteFromDetail()">🗑️ Elimina</button>
        </div>
        <button class="btn btn-secondary" style="margin-top:10px"
                onclick="closeDetail()">Chiudi</button>
    </div>
</div>
<script>
// ========== CONFIG ==========
const BIN_ID = '6840f43e8960c979a5a5a1ef';
const API_KEY = '$2a$10$yAkIzU6bBTdv7q33Aj7CKe7QrQJcpq1UjR77JTuxJibH4EA.41vT.';
const BASE_URL = 'https://api.jsonbin.io/v3/b';

// ========== STATE ==========
let products = [];
let editingId = null;
let currentFilter = 'all';
let currentCategory = 'all';
let selectedEmoji = '📦';
let codeReader = null;
let detailId = null;

const EMOJIS = ['🍝','🥫','🥛','🧀','🥩','🐟','🥚','🥦','🥕','🍎',
                '🍋','🧅','🧄','🍞','🥐','🧁','🍫','🍬','🧃','🥤',
                '☕','🫖','🍵','🧊','🫙','🛢️','🧹','🧴','💊','🐾','📦'];

const CATEGORY_EMOJIS = {
    '🍝 Pasta & Riso':'🍝','🥫 Conserve':'🥫','🥛 Latticini':'🥛',
    '🥩 Carne & Pesce':'🥩','🥦 Frutta & Verdura':'🥦','🧁 Dolci & Snack':'🧁',
    '🧃 Bevande':'🧃','🫙 Condimenti':'🫙','🧊 Surgelati':'🧊',
    '🍞 Pane & Cereali':'🍞','🧹 Pulizia Casa':'🧹','🧴 Igiene Personale':'🧴',
    '💊 Farmaci':'💊','🐾 Animali':'🐾','📦 Altro':'📦'
};

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', async () => {
    renderEmojiGrid();
    await loadFromJsonBin();
    setInterval(loadFromJsonBin, 60000);
    setInterval(checkNotifications, 300000);
});

// ========== JSONBIN ==========
async function loadFromJsonBin() {
    try {
        showSyncBar('🔄 Sincronizzazione...');
        const res = await fetch(`${BASE_URL}/${BIN_ID}/latest`, {
            headers: { 'X-Master-Key': API_KEY }
        });
        if (!res.ok) throw new Error('Errore fetch');
        const data = await res.json();
        products = data.record.products || [];
        hideSyncBar();
        renderAll();
        checkNotifications();
    } catch(e) {
        hideSyncBar();
        showToast('⚠️ Offline - dati locali', 'warning');
        renderAll();
    }
}

async function saveToJsonBin() {
    try {
        showSyncBar('💾 Salvataggio...');
        const res = await fetch(`${BASE_URL}/${BIN_ID}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': API_KEY
            },
            body: JSON.stringify({ products })
        });
        if (!res.ok) throw new Error('Errore salvataggio');
        hideSyncBar();
    } catch(e) {
        hideSyncBar();
        showToast('❌ Errore salvataggio', 'error');
    }
}

// ========== RENDER ==========
function renderAll() {
    renderStats();
    renderCategoryTabs();
    renderProducts();
}

function renderStats() {
    const today = new Date(); today.setHours(0,0,0,0);
    const in7 = new Date(today); in7.setDate(in7.getDate()+7);

    let expired=0, expiring=0, low=0;
    products.forEach(p => {
        if (p.expiry) {
            const d = new Date(p.expiry);
            if (d < today) expired++;
            else if (d <= in7) expiring++;
        }
        if (p.qty <= p.threshold) low++;
    });

    document.getElementById('count-all').textContent = products.length;
    document.getElementById('count-expired').textContent = expired;
    document.getElementById('count-expiring').textContent = expiring;
    document.getElementById('count-low').textContent = low;
}

function renderCategoryTabs() {
    const cats = ['all', ...new Set(products.map(p => p.category))];
    const tabs = document.getElementById('category-tabs');
    tabs.innerHTML = cats.map(c => `
        <div class="category-tab ${c === currentCategory ? 'active' : ''}"
             onclick="filterByCategory('${c}')">
            ${c === 'all' ? '🏠 Tutti' : c}
        </div>
    `).join('');
}

function renderProducts() {
    const grid = document.getElementById('products-grid');
    const search = document.getElementById('search-input').value.toLowerCase();
    const today = new Date(); today.setHours(0,0,0,0);
    const in7 = new Date(today); in7.setDate(in7.getDate()+7);

    let filtered = products.filter(p => {
        if (search && !p.name.toLowerCase().includes(search) &&
            !p.category.toLowerCase().includes(search)) return false;
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        if (currentFilter === 'expired') {
            return p.expiry && new Date(p.expiry) < today;
        }
        if (currentFilter === 'expiring') {
            const d = p.expiry ? new Date(p.expiry) : null;
            return d && d >= today && d <= in7;
        }
        if (currentFilter === 'low') return p.qty <= p.threshold;
        return true;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1">
                <div class="empty-state">
                    <span class="empty-state-icon">📦</span>
                    <div class="empty-state-title">Nessun prodotto trovato</div>
                    <p>Aggiungi il tuo primo prodotto con il pulsante +</p>
                </div>
            </div>`;
        return;
    }

    grid.innerHTML = filtered.map(p => {
        const d = p.expiry ? new Date(p.expiry) : null;
        let status = 'ok', badge = '';
        if (d) {
            if (d < today) { status = 'expired'; badge = '❌ Scaduto'; }
            else if (d <= in7) {
                const days = Math.ceil((d-today)/(1000*60*60*24));
                status = 'expiring';
                badge = `⚠️ ${days}gg`;
            }
        }
        if (p.qty <= p.threshold && status === 'ok') { status = 'low'; badge = '📉 Scorte basse'; }

        return `
        <div class="product-card ${status}" onclick="openDetail('${p.id}')">
            <div class="product-emoji">${p.emoji || '📦'}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-category">${p.category}</div>
            ${badge ? `<div class="product-badge ${status}">${badge}</div>` : ''}
            <div class="product-qty">
                <button class="qty-btn minus" onclick="event.stopPropagation();changeQty('${p.id}',-1)">−</button>
                <span class="qty-value">${p.qty} ${p.unit}</span>
                <button class="qty-btn plus" onclick="event.stopPropagation();changeQty('${p.id}',1)">+</button>
            </div>
            ${p.expiry ? `<div class="product-expiry">📅 ${formatDate(p.expiry)}</div>` : ''}
        </div>`;
    }).join('');
}

// ========== FILTRI ==========
function filterByStatus(status) {
    currentFilter = status;
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
    document.getElementById(`chip-${status}`).classList.add('active');
    renderProducts();
}

function filterByCategory(cat) {
    currentCategory = cat;
    renderCategoryTabs();
    renderProducts();
}

// ========== QUANTITÀ ==========
async function changeQty(id, delta) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    p.qty = Math.max(0, p.qty + delta);
    renderAll();
    await saveToJsonBin();
}

// ========== MODAL AGGIUNGI ==========
function openAddModal() {
    editingId = null;
    document.getElementById('add-modal-title').textContent = '➕ Aggiungi Prodotto';
    document.getElementById('input-name').value = '';
    document.getElementById('input-category').value = '📦 Altro';
    document.getElementById('input-qty').value = '1';
    document.getElementById('input-unit').value = 'pz';
    document.getElementById('input-expiry').value = '';
    document.getElementById('input-threshold').value = '2';
    document.getElementById('input-notes').value = '';
    document.getElementById('barcode-found-box').style.display = 'none';
    selectedEmoji = '📦';
    renderEmojiGrid();
    document.getElementById('add-modal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('add-modal').classList.remove('active');
    editingId = null;
}

function renderEmojiGrid() {
    const grid = document.getElementById('emoji-grid');
    if (!grid) return;
    grid.innerHTML = EMOJIS.map(e => `
        <div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}"
             onclick="selectEmoji('${e}')">${e}</div>
    `).join('');
}

function selectEmoji(e) {
    selectedEmoji = e;
    renderEmojiGrid();
}

async function saveProduct() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) { showToast('⚠️ Inserisci il nome!', 'warning'); return; }

    const product = {
        id: editingId || Date.now().toString(),
        name,
        category: document.getElementById('input-category').value,
        emoji: selectedEmoji,
        qty: parseFloat(document.getElementById('input-qty').value) || 0,
        unit: document.getElementById('input-unit').value,
        expiry: document.getElementById('input-expiry').value,
        threshold: parseFloat(document.getElementById('input-threshold').value) || 2,
        notes: document.getElementById('input-notes').value.trim(),
        updatedAt: new Date().toISOString()
    };

    if (editingId) {
        const i = products.findIndex(p => p.id === editingId);
        if (i !== -1) products[i] = product;
        showToast('✅ Prodotto aggiornato!', 'success');
    } else {
        products.push(product);
        showToast('✅ Prodotto aggiunto!', 'success');
    }

    closeAddModal();
    renderAll();
    await saveToJsonBin();
}

// ========== DETAIL MODAL ==========
function openDetail(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    detailId = id;
    const today = new Date(); today.setHours(0,0,0,0);

    document.getElementById('detail-emoji').textContent = p.emoji || '📦';
    document.getElementById('detail-name').textContent = p.name;
    document.getElementById('detail-category').textContent = p.category;

    let rows = `
        <div class="detail-row"><span class="detail-label">Quantità</span>
            <span class="detail-value">${p.qty} ${p.unit}</span></div>
        <div class="detail-row"><span class="detail-label">Soglia minima</span>
            <span class="detail-value">${p.threshold} ${p.unit}</span></div>
    `;
    if (p.expiry) rows += `
        <div class="detail-row"><span class="detail-label">Scadenza</span>
            <span class="detail-value">${formatDate(p.expiry)}</span></div>
    `;
    if (p.notes) rows += `
        <div class="detail-row"><span class="detail-label">Note</span>
            <span class="detail-value">${p.notes}</span></div>
    `;
    rows += `
        <div class="detail-row"><span class="detail-label">Aggiornato</span>
            <span class="detail-value">${p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('it-IT') : '-'}</span></div>
    `;
    document.getElementById('detail-rows').innerHTML = rows;
    document.getElementById('detail-modal').classList.add('active');
}

function closeDetail() {
    document.getElementById('detail-modal').classList.remove('active');
    detailId = null;
}

function editFromDetail() {
    const p = products.find(x => x.id === detailId);
    if (!p) return;
    closeDetail();
    editingId = p.id;
    document.getElementById('add-modal-title').textContent = '✏️ Modifica Prodotto';
    document.getElementById('input-name').value = p.name;
    document.getElementById('input-category').value = p.category;
    document.getElementById('input-qty').value = p.qty;
    document.getElementById('input-unit').value = p.unit;
    document.getElementById('input-expiry').value = p.expiry || '';
    document.getElementById('input-threshold').value = p.threshold;
    document.getElementById('input-notes').value = p.notes || '';
    document.getElementById('barcode-found-box').style.display = 'none';
    selectedEmoji = p.emoji || '📦';
    renderEmojiGrid();
    document.getElementById('add-modal').classList.add('active');
}

async function deleteFromDetail() {
    if (!confirm('Eliminare questo prodotto?')) return;
    products = products.filter(p => p.id !== detailId);
    closeDetail();
    showToast('🗑️ Prodotto eliminato', 'success');
    renderAll();
    await saveToJsonBin();
}

// ========== SCANNER ==========
async function openScanner() {
    closeAddModal();
    document.getElementById('scanner-modal').classList.add('active');
    document.getElementById('scanner-status').textContent = '📷 Avvio fotocamera...';
    document.getElementById('scanner-status').className = 'scanner-status loading';

    try {
        codeReader = new ZXing.BrowserMultiFormatReader();
        const devices = await codeReader.listVideoInputDevices();

        if (!devices || devices.length === 0) throw new Error('Nessuna fotocamera trovata');

        const backCamera = devices.find(d =>
            d.label.toLowerCase().includes('back') ||
            d.label.toLowerCase().includes('posterior') ||
            d.label.toLowerCase().includes('rear') ||
            d.label.toLowerCase().includes('environment')
        ) || devices[devices.length - 1];

        document.getElementById('scanner-status').textContent = '🔍 Inquadra il codice a barre...';
        document.getElementById('scanner-status').className = 'scanner-status';

        await codeReader.decodeFromVideoDevice(
            backCamera?.deviceId || undefined,
            'scanner-video',
            async (result, err) => {
                if (result) {
                    const barcode = result.getText();
                    await handleBarcodeResult(barcode);
                }
            }
        );
    } catch(err) {
        document.getElementById('scanner-status').textContent = `❌ ${err.message}`;
        document.getElementById('scanner-status').className = 'scanner-status error';
    }
}

function closeScanner() {
    if (codeReader) {
        codeReader.reset();
        codeReader = null;
    }
    document.getElementById('scanner-modal').classList.remove('active');
}

async function handleBarcodeResult(code) {
    document.getElementById('scanner-status').textContent = `✅ Codice: ${code} - Ricerca...`;
    document.getElementById('scanner-status').className = 'scanner-status';

    if (codeReader) { codeReader.reset(); codeReader = null; }

    try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
        const data = await res.json();

        if (data.status === 1) {
            const p = data.product;
            const name = p.product_name_it || p.product_name || p.generic_name || '';
            const brand = p.brands || '';
            const cat = mapCategory(p.categories_tags || []);
            const emoji = CATEGORY_EMOJIS[cat] || '📦';
            closeScanner();
            fillFormFromBarcode(name, brand, cat, emoji, code);
        } else {
            closeScanner();
            fillFormFromBarcode('', '', '📦 Altro', '📦', code);
            showToast('⚠️ Prodotto non trovato nel DB', 'warning');
        }
    } catch(e) {
        closeScanner();
        fillFormFromBarcode('', '', '📦 Altro', '📦', code);
        showToast('⚠️ Offline - compila manualmente', 'warning');
    }
}

function mapCategory(tags) {
    const t = tags.join(' ').toLowerCase();
    if (t.includes('pasta') || t.includes('rice') || t.includes('riso')) return '🍝 Pasta & Riso';
    if (t.includes('conserv') || t.includes('canned')) return '🥫 Conserve';
    if (t.includes('milk') || t.includes('latte') || t.includes('dairy')) return '🥛 Latticini';
    if (t.includes('meat') || t.includes('carne') || t.includes('fish') || t.includes('pesce')) return '🥩 Carne & Pesce';
    if (t.includes('fruit') || t.includes('vegetable') || t.includes('frutta') || t.includes('verdura')) return '🥦 Frutta & Verdura';
    if (t.includes('sweet') || t.includes('snack') || t.includes('dolci') || t.includes('biscuit')) return '🧁 Dolci & Snack';
    if (t.includes('drink') || t.includes('beverage') || t.includes('bevanda') || t.includes('juice')) return '🧃 Bevande';
    if (t.includes('bread') || t.includes('pane') || t.includes('cereal')) return '🍞 Pane & Cereali';
    if (t.includes('sauce') || t.includes('condiment') || t.includes('oil') || t.includes('olio')) return '🫙 Condimenti';
    if (t.includes('frozen') || t.includes('surgelat')) return '🧊 Surgelati';
    return '📦 Altro';
}

function fillFormFromBarcode(name, brand, category, emoji, code) {
    if (name) document.getElementById('input-name').value = name;
    if (category) document.getElementById('input-category').value = category;
    selectedEmoji = emoji;
    renderEmojiGrid();
    document.getElementById('barcode-found-box').style.display = 'flex';
    document.getElementById('barcode-found-name').textContent = name || 'Prodotto sconosciuto';
    document.getElementById('barcode-found-brand').textContent = brand || '';
    document.getElementById('barcode-found-emoji').textContent = emoji;
    document.getElementById('barcode-found-code').textContent = code;
    document.getElementById('add-modal').classList.add('active');
}

// ========== NOTIFICHE ==========
function checkNotifications() {
    const today = new Date(); today.setHours(0,0,0,0);
    const in7 = new Date(today); in7.setDate(in7.getDate()+7);
    const list = document.getElementById('notif-list');
    let items = '';
    let count = 0;

    products.forEach(p => {
        if (p.expiry) {
            const d = new Date(p.expiry);
            if (d < today) {
                items += `<div class="notif-item danger">❌ <b>${p.name}</b> è scaduto il ${formatDate(p.expiry)}</div>`;
                count++;
            } else if (d <= in7) {
                const days = Math.ceil((d-today)/(1000*60*60*24));
                items += `<div class="notif-item warning">⚠️ <b>${p.name}</b> scade tra ${days} giorni</div>`;
                count++;
            }
        }
        if (p.qty <= p.threshold) {
            items += `<div class="notif-item info">📉 <b>${p.name}</b> - scorte basse (${p.qty} ${p.unit})</div>`;
            count++;
        }
    });

    list.innerHTML = items || '<div class="notif-item">✅ Tutto ok!</div>';
    const btn = document.getElementById('notif-btn');
    btn.textContent = count > 0 ? `🔔 ${count}` : '🔔';
}

function toggleNotifPanel() {
    document.getElementById('notif-panel').classList.toggle('visible');
}

// ========== EXPORT ==========
function exportData() {
    const blob = new Blob([JSON.stringify({ products }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `dispensa_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast('📤 Export completato!', 'success');
}

// ========== UTILS ==========
function formatDate(s) {
    if (!s) return '';
    const [y,m,d] = s.split('-');
    return `${d}/${m}/${y}`;
}

function showSyncBar(msg) {
    const bar = document.getElementById('sync-bar');
    bar.textContent = msg;
    bar.style.display = 'block';
    document.querySelector('.header').style.marginTop = '36px';
}

function hideSyncBar() {
    document.getElementById('sync-bar').style.display = 'none';
    document.querySelector('.header').style.marginTop = '0';
}

let toastTimer;
function showToast(msg, type='info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Click fuori modal per chiuderli
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
        if (e.target === overlay) {
            overlay.classList.remove('active');
            if (overlay.id === 'scanner-modal') closeScanner();
        }
    });
});
</script>

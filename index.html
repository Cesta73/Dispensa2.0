<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Dispensa di Casa</title>
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dispensa">
    <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --primary:#2E7D32; --primary-light:#4CAF50; --primary-dark:#1B5E20;
            --danger:#D32F2F; --danger-light:#EF5350;
            --warning:#F57F17; --warning-light:#FFB300;
            --info:#0288D1;
            --surface:#FFFFFF; --background:#F1F8E9; --card-bg:#FFFFFF;
            --text-primary:#1A1A1A; --text-secondary:#666666;
            --border:#E0E0E0;
            --shadow:0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg:0 4px 16px rgba(0,0,0,0.15);
            --radius:12px; --radius-sm:8px;
        }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--background); color:var(--text-primary);
            min-height:100vh; overflow-x:hidden;
        }

        /* ===== LOGIN ===== */
        #login-screen {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; min-height:100vh; padding:24px;
        }
        .login-card {
            background:white; border-radius:20px; padding:32px 24px;
            box-shadow:var(--shadow-lg); width:100%; max-width:360px;
            text-align:center;
        }
        .login-logo { font-size:64px; margin-bottom:12px; }
        .login-title { font-size:24px; font-weight:700; color:var(--primary); margin-bottom:6px; }
        .login-subtitle { font-size:14px; color:var(--text-secondary); margin-bottom:28px; }
        .login-input {
            width:100%; padding:14px 16px; border:2px solid var(--border);
            border-radius:var(--radius); font-size:18px; font-weight:600;
            text-align:center; letter-spacing:3px; text-transform:uppercase;
            outline:none; margin-bottom:16px; transition:border-color 0.2s;
        }
        .login-input:focus { border-color:var(--primary); }
        .login-btn {
            width:100%; padding:14px; background:var(--primary); color:white;
            border:none; border-radius:var(--radius); font-size:16px;
            font-weight:600; cursor:pointer; transition:background 0.2s;
        }
        .login-btn:hover { background:var(--primary-dark); }
        .login-error {
            color:var(--danger); font-size:13px; margin-top:10px;
            display:none; font-weight:500;
        }

        /* ===== SYNC BAR ===== */
        .sync-bar {
            position:fixed; top:0; left:0; right:0; height:36px;
            background:var(--primary); color:white; display:none;
            align-items:center; justify-content:center;
            font-size:13px; font-weight:500; z-index:1000;
        }

        /* ===== HEADER ===== */
        .header {
            background:var(--primary); color:white; padding:16px;
            position:sticky; top:0; z-index:100;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }
        .header-top {
            display:flex; justify-content:space-between;
            align-items:center; margin-bottom:10px;
        }
        .header-title { font-size:18px; font-weight:700; }
        .header-family {
            font-size:12px; opacity:0.85; margin-top:2px;
        }
        .header-actions { display:flex; gap:8px; align-items:center; }
        .icon-btn {
            background:rgba(255,255,255,0.15); border:none; color:white;
            width:36px; height:36px; border-radius:50%; font-size:16px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .logout-btn {
            background:rgba(255,255,255,0.15); border:none; color:white;
            padding:6px 12px; border-radius:20px; font-size:12px;
            font-weight:600; cursor:pointer;
        }
        .search-bar {
            display:flex; gap:8px;
        }
        .search-input {
            flex:1; padding:8px 12px; border:none; border-radius:20px;
            font-size:14px; outline:none; background:rgba(255,255,255,0.95);
        }

        /* ===== STAT CHIPS ===== */
        .stat-chips {
            display:flex; gap:8px; padding:12px 16px;
            overflow-x:auto; scrollbar-width:none;
        }
        .stat-chips::-webkit-scrollbar { display:none; }
        .stat-chip {
            display:flex; align-items:center; gap:6px;
            padding:6px 14px; border-radius:20px; border:none;
            font-size:13px; font-weight:500; white-space:nowrap;
            cursor:pointer; background:white; color:var(--text-primary);
            box-shadow:var(--shadow); transition:all 0.2s;
        }
        .stat-chip.active { background:var(--primary); color:white; }
        .stat-chip .count {
            background:rgba(0,0,0,0.12); padding:1px 7px;
            border-radius:10px; font-size:12px;
        }
        .stat-chip.active .count { background:rgba(255,255,255,0.25); }

        /* ===== CATEGORY TABS ===== */
        .category-tabs {
            display:flex; gap:8px; padding:0 16px 12px;
            overflow-x:auto; scrollbar-width:none;
        }
        .category-tabs::-webkit-scrollbar { display:none; }
        .cat-tab {
            padding:5px 14px; border-radius:16px; border:none;
            font-size:13px; white-space:nowrap; cursor:pointer;
            background:white; color:var(--text-secondary);
            box-shadow:var(--shadow); transition:all 0.2s;
        }
        .cat-tab.active { background:var(--primary-light); color:white; font-weight:600; }

        /* ===== PRODUCTS ===== */
        .products-container { padding:0 16px 100px; }
        .products-grid {
            display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
        }
        .product-card {
            background:white; border-radius:var(--radius);
            padding:14px 12px; box-shadow:var(--shadow);
            cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
            position:relative; overflow:hidden;
        }
        .product-card:active { transform:scale(0.97); }
        .product-card.expired { border-left:4px solid var(--danger); }
        .product-card.expiring { border-left:4px solid var(--warning); }
        .product-card.low-stock { border-left:4px solid var(--info); }
        .card-emoji { font-size:32px; display:block; text-align:center; margin-bottom:6px; }
        .card-name {
            font-size:13px; font-weight:600; text-align:center;
            margin-bottom:3px; line-height:1.3;
            display:-webkit-box; -webkit-line-clamp:2;
            -webkit-box-orient:vertical; overflow:hidden;
        }
        .card-category {
            font-size:11px; color:var(--text-secondary);
            text-align:center; margin-bottom:8px;
        }
        .card-quantity {
            display:flex; align-items:center; justify-content:center;
            gap:8px; margin-top:6px;
        }
        .qty-btn {
            width:28px; height:28px; border-radius:50%; border:none;
            background:var(--primary); color:white; font-size:18px;
            font-weight:700; cursor:pointer; display:flex;
            align-items:center; justify-content:center; line-height:1;
        }
        .qty-btn.minus { background:var(--danger); }
        .qty-num { font-size:16px; font-weight:700; min-width:24px; text-align:center; }
        .card-expiry { font-size:11px; text-align:center; margin-top:5px; }
        .card-expiry.expired { color:var(--danger); font-weight:600; }
        .card-expiry.expiring { color:var(--warning); font-weight:600; }
        .card-expiry.ok { color:var(--primary); }

        /* ===== FAB ===== */
        .fab {
            position:fixed; bottom:24px; right:24px;
            width:58px; height:58px; border-radius:50%;
            background:var(--primary); color:white; border:none;
            font-size:28px; cursor:pointer; box-shadow:var(--shadow-lg);
            display:flex; align-items:center; justify-content:center;
            z-index:200; transition:transform 0.2s;
        }
        .fab:active { transform:scale(0.93); }

        /* ===== MODALS ===== */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5);
            z-index:500; display:none; align-items:flex-end;
            justify-content:center;
        }
        .modal-overlay.active { display:flex; }
        .modal {
            background:white; border-radius:20px 20px 0 0;
            padding:16px 20px 32px; width:100%; max-width:500px;
            max-height:90vh; overflow-y:auto;
        }
        .modal-handle {
            width:36px; height:4px; background:var(--border);
            border-radius:2px; margin:0 auto 16px;
        }
        .modal-title { font-size:18px; font-weight:700; margin-bottom:16px; }

        /* ===== FORM ===== */
        .form-group { margin-bottom:14px; }
        .form-label { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; display:block; }
        .form-input {
            width:100%; padding:11px 14px; border:2px solid var(--border);
            border-radius:var(--radius-sm); font-size:15px; outline:none;
            transition:border-color 0.2s; background:white;
        }
        .form-input:focus { border-color:var(--primary); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

        /* ===== EMOJI GRID ===== */
        .emoji-grid {
            display:grid; grid-template-columns:repeat(7,1fr);
            gap:6px; margin-top:6px;
        }
        .emoji-btn {
            aspect-ratio:1; border:2px solid transparent;
            border-radius:8px; font-size:22px; cursor:pointer;
            background:var(--background); display:flex;
            align-items:center; justify-content:center; transition:all 0.15s;
        }
        .emoji-btn.selected { border-color:var(--primary); background:#C8E6C9; }

        /* ===== BARCODE BOX ===== */
        .barcode-found-box {
            display:flex; align-items:center; gap:12px;
            background:#E8F5E9; border-radius:var(--radius);
            padding:12px 14px; margin-bottom:14px;
            border:2px solid var(--primary-light);
        }
        .barcode-found-emoji { font-size:36px; }
        .barcode-found-name { font-weight:700; font-size:15px; }
        .barcode-found-brand { font-size:13px; color:var(--text-secondary); }
        .barcode-found-code { font-size:11px; color:var(--text-secondary); font-family:monospace; }

        /* ===== SCANNER ===== */
        .scanner-container {
            width:100%; aspect-ratio:1; background:#000;
            border-radius:var(--radius); overflow:hidden;
            position:relative; margin-bottom:14px;
        }
        .scanner-overlay {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center;
        }
        .scanner-frame {
            width:200px; height:200px; border:3px solid var(--primary-light);
            border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.4);
        }
        .scanner-line {
            position:absolute; width:180px; height:3px;
            background:var(--primary-light); border-radius:2px;
            animation:scan 2s linear infinite;
        }
        @keyframes scan {
            0%   { top:calc(50% - 90px); }
            50%  { top:calc(50% + 90px); }
            100% { top:calc(50% - 90px); }
        }
        .scanner-status {
            text-align:center; font-size:14px; padding:8px;
            margin-bottom:10px; border-radius:var(--radius-sm);
            background:var(--background);
        }

        /* ===== BUTTONS ===== */
        .btn {
            width:100%; padding:14px; border:none; border-radius:var(--radius);
            font-size:16px; font-weight:600; cursor:pointer;
            margin-bottom:10px; transition:all 0.2s;
        }
        .btn-primary { background:var(--primary); color:white; }
        .btn-secondary { background:var(--background); color:var(--text-primary); }
        .btn-danger { background:var(--danger); color:white; }
        .btn-info { background:var(--info); color:white; }

        /* ===== DETAIL ===== */
        .detail-emoji { font-size:64px; text-align:center; margin-bottom:8px; }
        .detail-name { font-size:20px; font-weight:700; text-align:center; margin-bottom:4px; }
        .detail-category { font-size:13px; color:var(--text-secondary); text-align:center; margin-bottom:16px; }
        .detail-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 0; border-bottom:1px solid var(--border);
        }
        .detail-label { font-size:13px; color:var(--text-secondary); }
        .detail-value { font-size:14px; font-weight:600; }
        .detail-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }

        /* ===== NOTIF PANEL ===== */
        .notif-panel {
            position:fixed; top:0; right:-100%; bottom:0;
            width:min(320px, 100vw); background:white;
            box-shadow:var(--shadow-lg); z-index:600;
            transition:right 0.3s; overflow-y:auto;
        }
        .notif-panel.visible { right:0; }
        .notif-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 16px; border-bottom:1px solid var(--border);
            font-weight:700; font-size:16px;
            position:sticky; top:0; background:white;
        }
        .notif-item {
            padding:12px 16px; border-bottom:1px solid var(--border); font-size:14px;
        }
        .notif-item.danger { border-left:4px solid var(--danger); }
        .notif-item.warning { border-left:4px solid var(--warning); }
        .notif-item.info { border-left:4px solid var(--info); }

        /* ===== TOAST ===== */
        .toast {
            position:fixed; bottom:100px; left:50%;
            transform:translateX(-50%) translateY(20px);
            background:#333; color:white; padding:12px 24px;
            border-radius:25px; font-size:14px; font-weight:500;
            z-index:9999; opacity:0; transition:all 0.3s;
            white-space:nowrap; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { background:var(--primary); }
        .toast.error { background:var(--danger); }
        .toast.warning { background:var(--warning); }
        .toast.info { background:var(--info); }

        /* ===== LOADING ===== */
        .loading-spinner {
            width:40px; height:40px; border:4px solid var(--border);
            border-top-color:var(--primary); border-radius:50%;
            animation:spin 0.8s linear infinite; margin:40px auto;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-secondary); }
        .empty-state-icon { font-size:64px; margin-bottom:16px; display:block; }
        .empty-state-title { font-size:20px; font-weight:600; margin-bottom:8px; color:var(--text-primary); }

        /* ===== APP (nascosta finché non loggati) ===== */
        #app-screen { display:none; }
    </style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">🏠</div>
        <div class="login-title">Dispensa di Casa</div>
        <div class="login-subtitle">Inserisci il codice della tua famiglia</div>
        <input class="login-input" type="text" id="login-code-input"
               placeholder="ES. CESTA2024"
               maxlength="20"
               onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" onclick="doLogin()">🔑 Accedi</button>
        <div class="login-error" id="login-error">❌ Codice non trovato. Riprova.</div>
    </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="app-screen">

    <!-- SYNC BAR -->
    <div class="sync-bar" id="sync-bar">⏳ Sincronizzazione...</div>

    <!-- HEADER -->
    <div class="header" id="main-header">
        <div class="header-top">
            <div>
                <div class="header-title" id="header-title">🏠 Dispensa</div>
                <div class="header-family" id="header-family"></div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleNotifPanel()" id="notif-btn">🔔</button>
                <button class="icon-btn" onclick="exportData()">📤</button>
                <button class="logout-btn" onclick="doLogout()">Esci</button>
            </div>
        </div>
        <div class="search-bar">
            <input class="search-input" type="search" id="search-input"
                   placeholder="🔍 Cerca prodotto..."
                   oninput="renderProducts()">
        </div>
    </div>

    <!-- STAT CHIPS -->
    <div class="stat-chips">
        <button class="stat-chip active" id="chip-all" onclick="filterByStatus('all')">
            🏠 Tutti <span class="count" id="count-all">0</span>
        </button>
        <button class="stat-chip" id="chip-expired" onclick="filterByStatus('expired')">
            ❌ Scaduti <span class="count" id="count-expired">0</span>
        </button>
        <button class="stat-chip" id="chip-expiring" onclick="filterByStatus('expiring')">
            ⚠️ In scadenza <span class="count" id="count-expiring">0</span>
        </button>
        <button class="stat-chip" id="chip-low" onclick="filterByStatus('low')">
            📉 Scorta bassa <span class="count" id="count-low">0</span>
        </button>
    </div>

    <!-- CATEGORY TABS -->
    <div class="category-tabs" id="category-tabs"></div>

    <!-- PRODUCTS -->
    <div class="products-container">
        <div class="products-grid" id="products-grid">
            <div style="grid-column:1/-1">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openAddModal()">＋</button>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- NOTIFICATION PANEL -->
    <div class="notif-panel" id="notif-panel">
        <div class="notif-header">
            🔔 Notifiche
            <button onclick="toggleNotifPanel()"
                    style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
        </div>
        <div id="notif-list"></div>
    </div>

    <!-- ===== MODAL: SCANNER ===== -->
    <div class="modal-overlay" id="scanner-modal">
        <div class="modal">
            <div class="modal-handle"></div>
            <h2 class="modal-title">📷 Scansiona Barcode</h2>
            <div class="scanner-container">
                <video id="scanner-video"
                       style="width:100%;height:100%;object-fit:cover;"
                       playsinline></video>
                <div class="scanner-overlay">
                    <div style="position:relative;display:flex;align-items:center;justify-content:center;">
                        <div class="scanner-frame"></div>
                        <div class="scanner-line"></div>
                    </div>
                </div>
            </div>
            <div class="scanner-status" id="scanner-status">📷 Inquadra il codice a barre</div>
            <button class="btn btn-secondary" onclick="closeScanner()">✕ Chiudi Scanner</button>
        </div>
    </div>

    <!-- ===== MODAL: AGGIUNGI/MODIFICA ===== -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-handle"></div>
            <h2 class="modal-title" id="add-modal-title">➕ Aggiungi Prodotto</h2>

            <div class="barcode-found-box" id="barcode-found-box" style="display:none">
                <div class="barcode-found-emoji" id="barcode-found-emoji">📦</div>
                <div class="barcode-found-info">
                    <div class="barcode-found-name" id="barcode-found-name"></div>
                    <div class="barcode-found-brand" id="barcode-found-brand"></div>
                    <div class="barcode-found-code" id="barcode-found-code"></div>
                </div>
            </div>

            <button class="btn btn-info" onclick="openScanner()" style="margin-bottom:14px">
                📷 Scansiona Barcode
            </button>

            <div class="form-group">
                <label class="form-label">Nome Prodotto *</label>
                <input class="form-input" type="text" id="input-name"
                       placeholder="Es. Pasta Barilla...">
            </div>

            <div class="form-group">
                <label class="form-label">Categoria</label>
                <select class="form-input" id="input-category">
                    <option>🍝 Pasta & Riso</option>
                    <option>🥫 Conserve</option>
                    <option>🥛 Latticini</option>
                    <option>🥩 Carne & Pesce</option>
                    <option>🥦 Frutta & Verdura</option>
                    <option>🧁 Dolci & Snack</option>
                    <option>🧃 Bevande</option>
                    <option>🫙 Condimenti</option>
                    <option>🧊 Surgelati</option>
                    <option>🍞 Pane & Cereali</option>
                    <option>🧹 Pulizia Casa</option>
                    <option>🧴 Igiene Personale</option>
                    <option>💊 Farmaci</option>
                    <option>🐾 Animali</option>
                    <option>📦 Altro</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Emoji</label>
                <div class="emoji-grid" id="emoji-grid"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Quantità</label>
                    <input class="form-input" type="number" id="input-qty"
                           placeholder="1" min="0" value="1">
                </div>
                <div class="form-group">
                    <label class="form-label">Unità</label>
                    <select class="form-input" id="input-unit">
                        <option>pz</option><option>kg</option><option>g</option>
                        <option>L</option><option>ml</option><option>conf</option>
                        <option>bst</option><option>bot</option><option>latt</option>
                        <option>vaso</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Scadenza</label>
                    <input class="form-input" type="date" id="input-expiry">
                </div>
                <div class="form-group">
                    <label class="form-label">Soglia minima</label>
                    <input class="form-input" type="number" id="input-threshold"
                           placeholder="2" min="0" value="2">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Note</label>
                <input class="form-input" type="text" id="input-notes"
                       placeholder="Note opzionali...">
            </div>

            <button class="btn btn-primary" onclick="saveProduct()">💾 Salva Prodotto</button>
            <button class="btn btn-secondary" onclick="closeAddModal()">Annulla</button>
        </div>
    </div>

    <!-- ===== MODAL: DETTAGLIO ===== -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="detail-emoji" id="detail-emoji"></div>
            <div class="detail-name" id="detail-name"></div>
            <div class="detail-category" id="detail-category"></div>
            <div id="detail-rows"></div>
            <div class="detail-actions">
                <button class="btn btn-primary" style="margin-bottom:0"
                        onclick="editFromDetail()">✏️ Modifica</button>
                <button class="btn btn-danger" style="margin-bottom:0"
                        onclick="deleteFromDetail()">🗑️ Elimina</button>
            </div>
            <button class="btn btn-secondary" style="margin-top:10px"
                    onclick="closeDetail()">Chiudi</button>
        </div>
    </div>

</div><!-- fine #app-screen -->
<script>
// ========== CONFIG ==========
const MASTER_BIN_ID = '69dcb182aaba882197f2d83f';
const API_KEY = '$2a$10$yAkIzU6bBTdv7q33Aj7CKe7QrQJcpq1UjR77JTuxJibH4EA.41vT.';
const BASE_URL = 'https://api.jsonbin.io/v3/b';

// ========== STATE ==========
let products = [];
let currentFamily = null; // { code, nome, binId }
let editingId = null;
let currentFilter = 'all';
let currentCategory = 'all';
let selectedEmoji = '📦';
let codeReader = null;
let detailId = null;

const EMOJIS = ['🍝','🥫','🥛','🧀','🥩','🐟','🥚','🥦','🥕','🍎',
                '🍋','🧅','🧄','🍞','🥐','🧁','🍫','🍬','🧃','🥤',
                '☕','🫖','🍵','🧊','🫙','🛢️','🧹','🧴','💊','🐾','📦'];

const CATEGORY_EMOJIS = {
    '🍝 Pasta & Riso':'🍝','🥫 Conserve':'🥫','🥛 Latticini':'🥛',
    '🥩 Carne & Pesce':'🥩','🥦 Frutta & Verdura':'🥦','🧁 Dolci & Snack':'🧁',
    '🧃 Bevande':'🧃','🫙 Condimenti':'🫙','🧊 Surgelati':'🧊',
    '🍞 Pane & Cereali':'🍞','🧹 Pulizia Casa':'🧹','🧴 Igiene Personale':'🧴',
    '💊 Farmaci':'💊','🐾 Animali':'🐾','📦 Altro':'📦'
};

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
    renderEmojiGrid();

    // Controlla sessione salvata
    const saved = sessionStorage.getItem('currentFamily');
    if (saved) {
        currentFamily = JSON.parse(saved);
        enterApp();
    }
});

// ========== LOGIN ==========
async function doLogin() {
    const code = document.getElementById('login-code-input').value.trim().toUpperCase();
    const errorEl = document.getElementById('login-error');
    errorEl.style.display = 'none';

    if (!code) return;

    try {
        // Carica il BIN master
        const res = await fetch(`${BASE_URL}/${MASTER_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': API_KEY }
        });
        const data = await res.json();
        const famiglie = data.record.famiglie;

        if (!famiglie[code]) {
            errorEl.style.display = 'block';
            return;
        }

        // Famiglia trovata
        currentFamily = {
            code: code,
            nome: famiglie[code].nome,
            binId: famiglie[code].binId
        };

        sessionStorage.setItem('currentFamily', JSON.stringify(currentFamily));
        enterApp();

    } catch (err) {
        console.error(err);
        errorEl.textContent = '❌ Errore di connessione. Riprova.';
        errorEl.style.display = 'block';
    }
}

function doLogout() {
    sessionStorage.removeItem('currentFamily');
    currentFamily = null;
    products = [];
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-code-input').value = '';
}

async function enterApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('header-title').textContent = '🏠 Dispensa';
    document.getElementById('header-family').textContent = currentFamily.nome;
    await loadProducts();
}

// ========== JSONBIN: CARICA PRODOTTI ==========
async function loadProducts() {
    try {
        showSyncBar('⏳ Caricamento...');
        const res = await fetch(`${BASE_URL}/${currentFamily.binId}/latest`, {
            headers: { 'X-Master-Key': API_KEY }
        });
        const data = await res.json();
        products = data.record.products || [];
        renderAll();
    } catch (err) {
        console.error(err);
        showToast('❌ Errore caricamento dati', 'error');
    } finally {
        hideSyncBar();
    }
}

// ========== JSONBIN: SALVA PRODOTTI ==========
async function saveProducts() {
    try {
        showSyncBar('💾 Salvataggio...');
        await fetch(`${BASE_URL}/${currentFamily.binId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': API_KEY
            },
            body: JSON.stringify(products)
        });
        showToast('✅ Salvato!', 'success');
    } catch (err) {
        console.error(err);
        showToast('❌ Errore salvataggio', 'error');
    } finally {
        hideSyncBar();
    }
}

// ========== RENDER ==========
function renderAll() {
    updateCounts();
    renderCategoryTabs();
    renderProducts();
    renderNotifications();
}

function updateCounts() {
    const today = new Date(); today.setHours(0,0,0,0);
    const soon  = new Date(); soon.setDate(today.getDate() + 7);

    let expired=0, expiring=0, low=0;
    products.forEach(p => {
        if (p.expiry) {
            const d = new Date(p.expiry);
            if (d < today) expired++;
            else if (d <= soon) expiring++;
        }
        if (p.quantity <= (p.threshold || 2)) low++;
    });

    document.getElementById('count-all').textContent      = products.length;
    document.getElementById('count-expired').textContent  = expired;
    document.getElementById('count-expiring').textContent = expiring;
    document.getElementById('count-low').textContent      = low;

    // Badge notifiche
    const total = expired + expiring + low;
    document.getElementById('notif-btn').textContent = total > 0 ? '🔔' : '🔕';
}

function renderCategoryTabs() {
    const cats = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
    const tabs = document.getElementById('category-tabs');
    tabs.innerHTML = cats.map(c =>
        `<button class="cat-tab ${c === currentCategory ? 'active' : ''}"
                 onclick="filterByCategory('${c}')">
            ${c === 'all' ? '🏠 Tutti' : c}
         </button>`
    ).join('');
}

function getFilteredProducts() {
    const today = new Date(); today.setHours(0,0,0,0);
    const soon  = new Date(); soon.setDate(today.getDate() + 7);
    const q     = document.getElementById('search-input').value.toLowerCase();

    return products.filter(p => {
        // Filtro ricerca
        if (q && !p.name.toLowerCase().includes(q)) return false;

        // Filtro categoria
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;

        // Filtro status
        if (currentFilter === 'expired') {
            return p.expiry && new Date(p.expiry) < today;
        }
        if (currentFilter === 'expiring') {
            const d = p.expiry ? new Date(p.expiry) : null;
            return d && d >= today && d <= soon;
        }
        if (currentFilter === 'low') {
            return p.quantity <= (p.threshold || 2);
        }
        return true;
    });
}

function renderProducts() {
    const grid = document.getElementById('products-grid');
    const list = getFilteredProducts();

    if (list.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1">
                <div class="empty-state">
                    <span class="empty-state-icon">📭</span>
                    <div class="empty-state-title">Nessun prodotto</div>
                    <div>Premi + per aggiungere qualcosa!</div>
                </div>
            </div>`;
        return;
    }

    const today = new Date(); today.setHours(0,0,0,0);
    const soon  = new Date(); soon.setDate(today.getDate() + 7);

    grid.innerHTML = list.map(p => {
        let statusClass = '';
        let expiryHtml  = '';

        if (p.expiry) {
            const d = new Date(p.expiry);
            if (d < today) {
                statusClass = 'expired';
                expiryHtml  = `<div class="card-expiry expired">❌ Scaduto ${formatDate(p.expiry)}</div>`;
            } else if (d <= soon) {
                statusClass = 'expiring';
                expiryHtml  = `<div class="card-expiry expiring">⚠️ Scade ${formatDate(p.expiry)}</div>`;
            } else {
                expiryHtml  = `<div class="card-expiry ok">✅ ${formatDate(p.expiry)}</div>`;
            }
        }

        if (p.quantity <= (p.threshold || 2) && !statusClass) statusClass = 'low-stock';

        return `
        <div class="product-card ${statusClass}" onclick="openDetail('${p.id}')">
            <span class="card-emoji">${p.emoji || '📦'}</span>
            <div class="card-name">${p.name}</div>
            <div class="card-category">${p.category || ''}</div>
            <div class="card-quantity">
                <button class="qty-btn minus"
                        onclick="event.stopPropagation(); changeQty('${p.id}', -1)">−</button>
                <span class="qty-num">${p.quantity} ${p.unit || 'pz'}</span>
                <button class="qty-btn"
                        onclick="event.stopPropagation(); changeQty('${p.id}', +1)">+</button>
            </div>
            ${expiryHtml}
        </div>`;
    }).join('');
}

// ========== FILTRI ==========
function filterByStatus(f) {
    currentFilter = f;
    ['all','expired','expiring','low'].forEach(id => {
        document.getElementById(`chip-${id}`).classList.toggle('active', id === f);
    });
    renderProducts();
}

function filterByCategory(c) {
    currentCategory = c;
    renderCategoryTabs();
    renderProducts();
}

// ========== QUANTITÀ RAPIDA ==========
async function changeQty(id, delta) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    p.quantity = Math.max(0, p.quantity + delta);
    renderProducts();
    await saveProducts();
    updateCounts();
}

// ========== MODAL AGGIUNGI/MODIFICA ==========
function openAddModal() {
    editingId = null;
    selectedEmoji = '📦';
    document.getElementById('add-modal-title').textContent = '➕ Aggiungi Prodotto';
    document.getElementById('input-name').value     = '';
    document.getElementById('input-qty').value      = '1';
    document.getElementById('input-unit').value     = 'pz';
    document.getElementById('input-expiry').value   = '';
    document.getElementById('input-threshold').value= '2';
    document.getElementById('input-notes').value    = '';
    document.getElementById('input-category').value = '📦 Altro';
    document.getElementById('barcode-found-box').style.display = 'none';
    renderEmojiGrid();
    document.getElementById('add-modal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('add-modal').classList.remove('active');
    closeScanner();
}

function renderEmojiGrid() {
    document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
        `<button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}"
                 onclick="selectEmoji('${e}')">${e}</button>`
    ).join('');
}

function selectEmoji(e) {
    selectedEmoji = e;
    renderEmojiGrid();
}

async function saveProduct() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) { showToast('⚠️ Inserisci il nome!', 'warning'); return; }

    const product = {
        id:        editingId || Date.now().toString(),
        name,
        category:  document.getElementById('input-category').value,
        emoji:     selectedEmoji,
        quantity:  parseFloat(document.getElementById('input-qty').value) || 1,
        unit:      document.getElementById('input-unit').value,
        expiry:    document.getElementById('input-expiry').value || null,
        threshold: parseInt(document.getElementById('input-threshold').value) || 2,
        notes:     document.getElementById('input-notes').value.trim(),
        updatedAt: new Date().toISOString()
    };

    if (editingId) {
        const idx = products.findIndex(p => p.id === editingId);
        if (idx !== -1) products[idx] = product;
    } else {
        products.push(product);
    }

    closeAddModal();
    renderAll();
    await saveProducts();
}

// ========== DETTAGLIO ==========
function openDetail(id) {
    detailId = id;
    const p = products.find(x => x.id === id);
    if (!p) return;

    document.getElementById('detail-emoji').textContent    = p.emoji || '📦';
    document.getElementById('detail-name').textContent     = p.name;
    document.getElementById('detail-category').textContent = p.category || '';

    const today = new Date(); today.setHours(0,0,0,0);
    let expiryText = '—';
    if (p.expiry) {
        const d = new Date(p.expiry);
        expiryText = formatDate(p.expiry);
        if (d < today) expiryText += ' ❌ SCADUTO';
    }

    document.getElementById('detail-rows').innerHTML = `
        <div class="detail-row">
            <span class="detail-label">Quantità</span>
            <span class="detail-value">${p.quantity} ${p.unit || 'pz'}</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Scadenza</span>
            <span class="detail-value">${expiryText}</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Soglia minima</span>
            <span class="detail-value">${p.threshold || 2} ${p.unit || 'pz'}</span>
        </div>
        ${p.notes ? `
        <div class="detail-row">
            <span class="detail-label">Note</span>
            <span class="detail-value">${p.notes}</span>
        </div>` : ''}
    `;

    document.getElementById('detail-modal').classList.add('active');
}

function closeDetail() {
    document.getElementById('detail-modal').classList.remove('active');
}

function editFromDetail() {
    closeDetail();
    const p = products.find(x => x.id === detailId);
    if (!p) return;
    editingId    = p.id;
    selectedEmoji = p.emoji || '📦';

    document.getElementById('add-modal-title').textContent  = '✏️ Modifica Prodotto';
    document.getElementById('input-name').value      = p.name;
    document.getElementById('input-category').value  = p.category || '📦 Altro';
    document.getElementById('input-qty').value       = p.quantity;
    document.getElementById('input-unit').value      = p.unit || 'pz';
    document.getElementById('input-expiry').value    = p.expiry || '';
    document.getElementById('input-threshold').value = p.threshold || 2;
    document.getElementById('input-notes').value     = p.notes || '';
    document.getElementById('barcode-found-box').style.display = 'none';
    renderEmojiGrid();
    document.getElementById('add-modal').classList.add('active');
}

async function deleteFromDetail() {
    if (!confirm('Eliminare questo prodotto?')) return;
    products = products.filter(p => p.id !== detailId);
    closeDetail();
    renderAll();
    await saveProducts();
}

// ========== NOTIFICHE ==========
function renderNotifications() {
    const today = new Date(); today.setHours(0,0,0,0);
    const soon  = new Date(); soon.setDate(today.getDate() + 7);
    const list  = document.getElementById('notif-list');
    const items = [];

    products.forEach(p => {
        if (p.expiry) {
            const d = new Date(p.expiry);
            if (d < today) items.push({ type:'danger',  text:`❌ ${p.name} è scaduto il ${formatDate(p.expiry)}` });
            else if (d <= soon) items.push({ type:'warning', text:`⚠️ ${p.name} scade il ${formatDate(p.expiry)}` });
        }
        if (p.quantity <= (p.threshold || 2))
            items.push({ type:'info', text:`📉 ${p.name}: solo ${p.quantity} ${p.unit||'pz'} rimast${p.quantity===1?'o':'i'}` });
    });

    list.innerHTML = items.length === 0
        ? '<div class="notif-item">✅ Tutto in ordine!</div>'
        : items.map(i => `<div class="notif-item ${i.type}">${i.text}</div>`).join('');
}

function toggleNotifPanel() {
    document.getElementById('notif-panel').classList.toggle('visible');
}

// ========== SCANNER ==========
function openScanner() {
    document.getElementById('scanner-modal').classList.add('active');
    startScanner();
}

function closeScanner() {
    document.getElementById('scanner-modal').classList.remove('active');
    if (codeReader) {
        codeReader.reset();
        codeReader = null;
    }
}

async function startScanner() {
    try {
        codeReader = new ZXing.BrowserMultiFormatReader();
        const devices = await codeReader.listVideoInputDevices();
        const deviceId = devices.length > 1 ? devices[1].deviceId : (devices[0]?.deviceId);
        document.getElementById('scanner-status').textContent = '📷 Inquadra il codice a barre...';

        codeReader.decodeFromVideoDevice(deviceId, 'scanner-video', async (result, err) => {
            if (result) {
                const barcode = result.getText();
                codeReader.reset();
                codeReader = null;
                closeScanner();
                await lookupBarcode(barcode);
            }
        });
    } catch (err) {
        document.getElementById('scanner-status').textContent = '❌ Fotocamera non disponibile';
        console.error(err);
    }
}

async function lookupBarcode(barcode) {
    showToast('🔍 Ricerca prodotto...', 'info');
    try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
        const data = await res.json();

        if (data.status === 1) {
            const prod = data.product;
            const name  = prod.product_name_it || prod.product_name || '';
            const brand = prod.brands || '';
            const cat   = prod.categories_tags?.[0]?.replace('en:','') || '';

            // Indovina categoria
            const guessedCat = guessCategoryFromName(name + ' ' + cat);
            document.getElementById('input-category').value = guessedCat;

            // Indovina emoji
            selectedEmoji = guessEmojiFromCategory(guessedCat);
            renderEmojiGrid();

            // Mostra box barcode
            document.getElementById('barcode-found-emoji').textContent = selectedEmoji;
            document.getElementById('barcode-found-name').textContent  = name || barcode;
            document.getElementById('barcode-found-brand').textContent = brand;
            document.getElementById('barcode-found-code').textContent  = `📦 ${barcode}`;
            document.getElementById('barcode-found-box').style.display = 'flex';
            document.getElementById('input-name').value = name || '';
            showToast('✅ Prodotto trovato!', 'success');
        } else {
            document.getElementById('barcode-found-code').textContent  = `📦 ${barcode}`;
            document.getElementById('barcode-found-name').textContent  = 'Prodotto non trovato';
            document.getElementById('barcode-found-brand').textContent = 'Inserisci i dati manualmente';
            document.getElementById('barcode-found-box').style.display = 'flex';
            showToast('⚠️ Prodotto non nel database', 'warning');
        }
    } catch (err) {
        showToast('❌ Errore ricerca barcode', 'error');
    }
}

function guessCategoryFromName(text) {
    const t = text.toLowerCase();
    if (/pasta|riso|grano|cereali/.test(t))        return '🍝 Pasta & Riso';
    if (/latte|yogurt|formagg|burro/.test(t))      return '🥛 Latticini';
    if (/carne|pollo|manzo|pesce|tonno/.test(t))   return '🥩 Carne & Pesce';
    if (/succo|acqua|bibita|bevanda|caffè/.test(t))return '🧃 Bevande';
    if (/biscott|cioccolat|dolce|snack/.test(t))   return '🧁 Dolci & Snack';
    if (/olio|aceto|salsa|condiment/.test(t))      return '🫙 Condimenti';
    if (/frutta|verdura|ortaggi/.test(t))          return '🥦 Frutta & Verdura';
    if (/gelato|surgelat/.test(t))                 return '🧊 Surgelati';
    if (/pane|cereali|farina/.test(t))             return '🍞 Pane & Cereali';
    if (/detersivo|pulizia|sapone/.test(t))        return '🧹 Pulizia Casa';
    if (/farmac|medicinale|vitamina/.test(t))      return '💊 Farmaci';
    return '📦 Altro';
}

function guessEmojiFromCategory(cat) {
    return CATEGORY_EMOJIS[cat] || '📦';
}

// ========== EXPORT ==========
function exportData() {
    const json = JSON.stringify(products, null, 2);
    const blob = new Blob([json], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `dispensa_${currentFamily.nome}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📤 Export completato!', 'success');
}

// ========== UTILS ==========
function formatDate(s) {
    if (!s) return '';
    const [y,m,d] = s.split('-');
    return `${d}/${m}/${y}`;
}

function showSyncBar(msg) {
    const bar = document.getElementById('sync-bar');
    bar.textContent = msg;
    bar.style.display = 'flex';
    document.getElementById('main-header').style.marginTop = '36px';
}

function hideSyncBar() {
    document.getElementById('sync-bar').style.display = 'none';
    document.getElementById('main-header').style.marginTop = '0';
}

let toastTimer;
function showToast(msg, type='info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Chiudi modal cliccando fuori
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
        if (e.target === overlay) {
            overlay.classList.remove('active');
            if (overlay.id === 'scanner-modal') closeScanner();
        }
    });
});
</script>
